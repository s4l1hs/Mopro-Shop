version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - depguard
    - gocyclo
    - errcheck
    - revive
    - gosec
    - gocritic
    - unused       # catch unused unexported code (funcs/types/vars/consts/fields).
                   # NOTE (golangci-lint v2): `unused` treats EXPORTED library
                   # symbols as used-externally, so exported-but-unreachable code is
                   # NOT caught here — the `make deadcode` step (whole-program
                   # reachability) guards that class. See CONTRIBUTING.

  settings:
    # depguard rules from DEVELOPMENT.md § 9 verbatim
    depguard:
      rules:
        core-modules-no-fin:
          list-mode: lax
          files:
            - "internal/identity/**"
            - "internal/catalog/**"
            - "internal/cart/**"
            - "internal/order/**"
            - "internal/payment/**"
            - "internal/seller/**"
            - "internal/search/**"
          deny:
            - pkg: github.com/mopro/platform/internal/wallet
              desc: "core-svc modules MUST NOT import fin-svc internals; use eventbus"
            - pkg: github.com/mopro/platform/internal/commission
              desc: "core-svc modules MUST NOT import fin-svc internals; use eventbus"
            - pkg: github.com/mopro/platform/internal/treasury
              desc: "core-svc modules MUST NOT import fin-svc internals; use eventbus"
            - pkg: github.com/mopro/platform/internal/cashback
              desc: "core-svc modules MUST NOT import fin-svc internals; use eventbus"
            - pkg: github.com/mopro/platform/internal/sellerpayout
              desc: "core-svc modules MUST NOT import fin-svc internals; use eventbus"
        fin-no-ecom:
          files:
            - "internal/wallet/**"
            - "internal/commission/**"
            - "internal/treasury/**"
            - "internal/cashback/**"
            - "internal/sellerpayout/**"
            - "internal/refund/**"
          deny:
            - pkg: github.com/mopro/platform/internal/order
              desc: "fin-svc MUST NOT import core-svc internals"
            - pkg: github.com/mopro/platform/internal/payment
              desc: "fin-svc MUST NOT import core-svc internals"
        cashback-uses-wallet-via-public-api:
          files:
            - "internal/cashback/**"
            - "internal/sellerpayout/**"
          deny:
            - pkg: github.com/mopro/platform/internal/wallet/repository
              desc: "Use wallet public Service interface, not internal repository"
        modules-only-via-api:
          files:
            - "internal/order/**"
          deny:
            - pkg: github.com/mopro/platform/internal/catalog/repository
              desc: "Use internal/catalog public interface"
            - pkg: github.com/mopro/platform/internal/catalog/service
              desc: "Use internal/catalog public interface"

    gocyclo:
      min-complexity: 15

    errcheck:
      check-type-assertions: true
      exclude-functions:
        - fmt.Printf
        - fmt.Println
        - fmt.Fprintf
        - fmt.Fprintln
        - fmt.Fprint
        - (io.Closer).Close

    revive:
      min-confidence: 0
      rules:
        - name: exported
          disabled: true
        - name: unused-parameter
          disabled: true

    gosec:
      excludes:
        - G104  # unhandled errors: handled explicitly in skeleton stubs
        - G706  # log injection: MARKET/SVC_NAME are operator env vars, not user input
        - G101  # hardcoded credentials: test-only webhook tokens, not prod secrets
        - G117  # marshaled field with secret-matching name: legitimate PSP API fields (PTT/Surat use Password in SOAP/JSON)

  exclusions:
    # Exclude generated code. `generated: lax` (the v2 default, made explicit) drops
    # files carrying the `// Code generated … DO NOT EDIT.` header — but that header
    # match keys off the file path and SILENTLY STOPS WORKING from a git worktree,
    # where golangci-lint reports our files under a `../<main-checkout>/…` out-of-tree
    # path (the package still resolves correctly via `go list`; only golangci's path
    # display/match is off). That caused false positives (errcheck/gocyclo/gosec) on
    # internal/api/gen/{core,fin}/server.gen.go and forced `git push --no-verify`.
    # `paths` is an UNANCHORED substring regex, so "internal/api/gen" matches BOTH
    # "internal/api/gen/…" (main checkout) AND "../Mopro-Shop/internal/api/gen/…"
    # (worktree) — making the exclusion worktree-robust. internal/api/gen/ is 100%
    # oapi-codegen output (regenerated by `make api-gen`, never hand-edited).
    # (CI-hygiene-2; docs/internal/ci-hygiene-2.md §2.)
    generated: lax
    paths:
      - "internal/api/gen"
    rules:
      # cmd/*/main.go wires up multiple services — startup complexity is intentional
      - path: "cmd/.*\\.go"
        linters: [gocyclo]
      # cmd/*/main.go exits during fatal startup before deferred OTel shutdown has value;
      # skipping the shutdown flush on a startup failure path is intentional.
      - path: "cmd/.*\\.go"
        linters: [gocritic]
        text: "exitAfterDefer"
      # PostInTx validates multi-currency double-entry + idempotency; complex by design
      - path: "internal/wallet/service\\.go"
        linters: [gocyclo]
      # processBatch coordinates PSP retry + alert + ledger tx; complex by design
      - path: "internal/sellerpayout/run_daily\\.go"
        linters: [gocyclo]
      # shipping test servers use json/xml encoders in httptest handlers; errors non-fatal
      - path: "internal/shipping/.*/adapter_test\\.go"
        linters: [errcheck]
      # property tests use math/rand for deterministic seeding of gopter RNG — not security-sensitive
      - path: "_test\\.go"
        linters: [gosec]
        text: "G404"
      # web/node_modules/ contains a bundled Go copy of `flatted` from the
      # npm registry — third-party code, not our lint surface.
      - path: "web/node_modules/.*"
        linters: [gocyclo, errcheck, gosec, gocritic, revive, depguard]
      # scripts/seed/ is an admin CLI tool reading its own config-dir JSON;
      # G304 (file inclusion via variable) is a false positive — `path` is
      # built from operator-controlled cfg.DataDir, not user input.
      - path: "scripts/seed/.*"
        linters: [gosec]
        text: "G304"
      # `defer f.Close()` on a read-only file open is the standard Go idiom;
      # any close error after a successful Decode doesn't change correctness.
      - path: "scripts/seed/.*"
        linters: [errcheck]
        text: "f.Close"
      # LoginEmail orchestrates email/password verification + MFA dispatch +
      # rate-limit checks + token issuance. Complexity 18 reflects the real
      # auth control flow; refactoring is a focused task, not a drive-by.
      - path: "internal/identity/service\\.go"
        linters: [gocyclo]
