openapi: "3.1.0"

info:
  title: Mopro Shop API
  version: "1.0.0"
  description: |
    Mobile-first marketplace API for Mopro Shop. Buyer app + seller panel.

    ## Money format
    All monetary values are **integer minor units** (kuruş for TRY; coin-minor for TRY_COIN).
    Every monetary field is accompanied by a `currency` string field.
    Never use decimal values. Display layer divides by 100.

    ## Timestamps
    All timestamps are **RFC 3339 strings** (e.g. `"2026-01-15T10:00:00Z"`).
    Dates (no time component) use ISO 8601 `YYYY-MM-DD`.

    ## Locale resolution
    Product `title` and `description` are resolved server-side from the
    `Accept-Language` request header. The response always contains a single
    resolved string — never a `translations[]` array.
    Fallback chain: requested locale → `tr-TR` → first available locale.

    ## Step-up authentication flow
    Endpoints annotated with `stepUpAuth` require a short-lived step-up token
    (TTL 5 min, claim `scope=high_sensitivity`). Sending a regular access token
    to a `stepUpAuth` endpoint returns `403` with `code: step_up_required`.

    Client flow:
    1. Receive `403 step_up_required`.
    2. Present OTP entry screen.
    3. `POST /auth/step-up` with access token + fresh OTP code → `step_up_token`.
    4. Retry the original request with `Authorization: Bearer <step_up_token>`.

    ## X-Trace-Id
    Clients should generate a UUID per request and attach it as `X-Trace-Id`.
    The server echoes the value in `error.trace_id`. Falls back to a
    server-generated UUID if the header is absent.

    ## Idempotency
    All state-mutating endpoints (POST/PUT/PATCH/DELETE, except OTP request)
    require `X-Idempotency-Key` (UUIDv7). Duplicate keys within 24 hours return
    the cached response without re-executing the operation.

    ## Binary routing
    Caddy routes by path prefix:
    - `/wallet/*` → fin-svc
    - `/cashback/*` → fin-svc
    - All other `/*` → core-svc
    See `deploy/CADDY-ROUTING.md` for the authoritative mapping.
  contact:
    name: Mopro Platform Team
    email: platform@moproshop.com

servers:
  - url: https://api.moproshop.com
    description: Production (Caddy ingress — routes wallet/cashback to fin-svc, rest to core-svc)
  - url: http://localhost:8080
    description: Local core-svc
  - url: http://localhost:8081
    description: Local fin-svc

security:
  - bearerAuth: []

tags:
  - name: auth
    description: Authentication — OTP, tokens, step-up
  - name: me
    description: Authenticated user profile and devices
  - name: address
    description: Delivery address book
  - name: catalog
    description: Products, variants, categories
  - name: search
    description: Full-text search powered by Meilisearch
  - name: discovery
    description: Banners and personalised recommendations
  - name: cart
    description: Shopping cart management
  - name: orders
    description: Order lifecycle and returns
  - name: seller
    description: Seller transparency and payout breakdown
  - name: wallet
    description: Coin wallet balance and transaction history (served by fin-svc)
  - name: cashback
    description: Perpetual cashback plans and monthly payments (served by fin-svc)
  - name: admin
    description: Internal admin operations. Not exposed to mobile clients.
  - name: health
    description: Health check

paths:

  # ── Auth ──────────────────────────────────────────────────────────────────────

  /auth/otp/request:
    post:
      operationId: RequestOtp
      tags: [auth]
      summary: Request a one-time password via SMS
      description: |
        Dispatches a 6-digit OTP to the provided phone number.
        Rate-limited per phone: max 3 requests per 5 minutes.
        X-Idempotency-Key is NOT honored here — each call always dispatches
        a new OTP to avoid replay-suppression attacks.
      security: []
      parameters:
        - $ref: '#/components/parameters/TraceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone]
              properties:
                phone:
                  type: string
                  pattern: '^\+90[5][0-9]{9}$'
                  example: "+905321234567"
                  description: "Turkish mobile number in E.164 format. Must start with +905."
                purpose:
                  type: string
                  enum: [login, step_up]
                  description: |
                    OTP purpose. Omit (or send `login`) for initial authentication —
                    the server treats an absent value as `login`.
                    Use `step_up` only if you need a step-up OTP outside the authenticated
                    step-up flow (`POST /auth/step-up/request`). Most clients should omit
                    this field and rely on the server's `login` default.
      responses:
        '204':
          description: OTP dispatched
        '400':
          $ref: '#/components/responses/BadRequest'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalError'

  /auth/otp/verify:
    post:
      operationId: VerifyOtp
      tags: [auth]
      summary: Verify OTP and issue access + refresh token pair
      security: []
      parameters:
        - $ref: '#/components/parameters/TraceId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone, code]
              properties:
                phone:
                  type: string
                  pattern: '^\+90[5][0-9]{9}$'
                code:
                  type: string
                  pattern: '^\d{6}$'
                  example: "123456"
                purpose:
                  type: string
                  enum: [login, step_up]
                  description: "Must match the purpose used in the corresponding /otp/request call. Omit (or send `login`) for login — the server treats an absent value as `login`."
      responses:
        '200':
          description: Token pair issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenPair'
        '401':
          description: OTP invalid or expired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalError'

  /auth/token/refresh:
    post:
      operationId: RefreshToken
      tags: [auth]
      summary: Exchange a refresh token for a new token pair
      security: []
      parameters:
        - $ref: '#/components/parameters/TraceId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
      responses:
        '200':
          description: New token pair issued; old refresh token revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenPair'
        '401':
          description: Refresh token invalid, expired, or revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          $ref: '#/components/responses/InternalError'

  /auth/logout:
    post:
      operationId: Logout
      tags: [auth]
      summary: Revoke the provided refresh token
      parameters:
        - $ref: '#/components/parameters/TraceId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
      responses:
        '204':
          description: Refresh token revoked
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /auth/step-up:
    post:
      operationId: StepUp
      tags: [auth]
      summary: Exchange access token + fresh OTP for a step-up token (TTL 5 min)
      description: |
        Call this after receiving `403 step_up_required`. The caller must have
        already called `/auth/otp/request` to obtain a fresh OTP for the
        currently authenticated phone number.
      parameters:
        - $ref: '#/components/parameters/TraceId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [otp_code]
              properties:
                otp_code:
                  type: string
                  pattern: '^\d{6}$'
      responses:
        '200':
          description: Step-up token issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StepUpTokenResponse'
        '401':
          description: OTP invalid, expired, or access token invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalError'

  # ── Me ────────────────────────────────────────────────────────────────────────

  /me:
    get:
      operationId: GetMe
      tags: [me]
      summary: Get authenticated user profile
      parameters:
        - $ref: '#/components/parameters/TraceId'
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

    patch:
      operationId: UpdateMe
      tags: [me]
      summary: Update user profile fields
      parameters:
        - $ref: '#/components/parameters/TraceId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name_first:
                  type: string
                name_last:
                  type: string
                email:
                  type: string
                  format: email
                locale:
                  type: string
                  example: tr-TR
      responses:
        '200':
          description: Updated user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          $ref: '#/components/responses/InternalError'

    delete:
      operationId: DeleteMe
      tags: [me]
      summary: Soft-delete the authenticated user account (KVKK / GDPR)
      description: |
        Requires step-up authentication (`stepUpAuth` security scheme).
        Account enters a 30-day grace period before permanent deletion.
        All active cashback plans are cancelled on confirmation.
      security:
        - stepUpAuth: []
      parameters:
        - $ref: '#/components/parameters/TraceId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason:
                  type: string
                  enum: [no_longer_needed, privacy_concern, bad_experience, switching_platform, other]
      responses:
        '204':
          description: Account scheduled for deletion
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/StepUpRequired'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          $ref: '#/components/responses/InternalError'

  /me/password:
    post:
      operationId: ChangePassword
      tags: [me]
      summary: Change the authenticated user's password
      description: |
        Requires the current password in the body for verification. On success,
        all existing refresh tokens for the user are revoked (forces re-login
        on every other device). Rate limited by IP. Returns 401
        `invalid_credentials` if old_password does not match; 422
        `weak_password` if new_password fails strength rules.
      parameters:
        - $ref: '#/components/parameters/TraceId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [old_password, new_password]
              properties:
                old_password:
                  type: string
                  format: password
                  description: Current password (plaintext over TLS)
                new_password:
                  type: string
                  format: password
                  minLength: 8
                  description: New password (≥8 chars, 1 upper, 1 lower, 1 special)
      responses:
        '204':
          description: Password updated; all other sessions revoked
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalError'

  /me/devices:
    post:
      operationId: RegisterDevice
      tags: [me]
      summary: Register a device FCM token for push notifications
      parameters:
        - $ref: '#/components/parameters/TraceId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fcm_token, device_model, os_version]
              properties:
                fcm_token:
                  type: string
                device_model:
                  type: string
                  example: "Samsung Galaxy S25"
                os_version:
                  type: string
                  example: "Android 16"
      responses:
        '201':
          description: Device registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Device'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          $ref: '#/components/responses/InternalError'

  /me/devices/{id}:
    delete:
      operationId: UnregisterDevice
      tags: [me]
      summary: Remove a registered device (deregister push notifications)
      parameters:
        - $ref: '#/components/parameters/TraceId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Device removed
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          $ref: '#/components/responses/InternalError'

  # ── Addresses ─────────────────────────────────────────────────────────────────

  /addresses:
    get:
      operationId: ListAddresses
      tags: [address]
      summary: List the authenticated user's delivery addresses
      parameters:
        - $ref: '#/components/parameters/TraceId'
      responses:
        '200':
          description: Address list
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Address'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

    post:
      operationId: CreateAddress
      tags: [address]
      summary: Add a new delivery address
      parameters:
        - $ref: '#/components/parameters/TraceId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddressInput'
      responses:
        '201':
          description: Address created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Address'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          $ref: '#/components/responses/InternalError'

  /addresses/{id}:
    put:
      operationId: UpdateAddress
      tags: [address]
      summary: Update an existing address
      parameters:
        - $ref: '#/components/parameters/TraceId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddressInput'
      responses:
        '200':
          description: Updated address
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Address'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          $ref: '#/components/responses/InternalError'

    delete:
      operationId: DeleteAddress
      tags: [address]
      summary: Delete an address
      parameters:
        - $ref: '#/components/parameters/TraceId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Address deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          $ref: '#/components/responses/InternalError'

  # ── Catalog ───────────────────────────────────────────────────────────────────

  /categories:
    get:
      operationId: ListCategories
      tags: [catalog]
      summary: List all 42 product categories (locale-resolved names)
      description: |
        Returns a flat list of active categories; each row carries `parent_id`
        for client-side tree reconstruction. Default behavior returns all
        depths (mobile callers rely on this — do not change).

        Optional `depth` query param filters to categories whose chain length
        to a root parent is at most N (root=0, direct children=1, …). Used by
        the desktop mega menu (Session 4c §3) to pre-load the bar +
        subcategory leaves in one call. Hard ceiling: 1000 nodes per response.
      parameters:
        - $ref: '#/components/parameters/TraceId'
        - name: depth
          in: query
          required: false
          description: |
            Filter chain length from root parent. Valid range 1..3. Omitting
            the param returns all depths (historical behavior).
          schema:
            type: integer
            minimum: 1
            maximum: 3
      responses:
        '200':
          description: Category list
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Category'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /categories/{id}/commission:
    get:
      operationId: GetCategoryCommission
      tags: [catalog, admin]
      summary: Get live commission and KDV rates for a category + market pair
      security:
        - adminAuth: []
      parameters:
        - $ref: '#/components/parameters/TraceId'
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: market
          in: query
          required: false
          schema:
            type: string
            example: TR
            default: TR
      responses:
        '200':
          description: Category commission rates
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryCommission'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /categories/{id}/facets:
    get:
      operationId: GetCategoryFacets
      tags: [catalog]
      summary: Faceted attribute aggregation for a category (PLP-13)
      description: |
        For each facetable attribute of the category (and its subtree, PLP-12),
        returns the (value, count) buckets — the buyer-facing filter facets
        (mirrors the brand/rating facets). Driven by `category_facets` +
        `product_attributes`; counts are DISTINCT products. Names are resolved
        from `Accept-Language`.
      parameters:
        - $ref: '#/components/parameters/TraceId'
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Facet buckets for the category
          content:
            application/json:
              schema:
                type: object
                required: [facets]
                properties:
                  facets:
                    type: array
                    items:
                      $ref: '#/components/schemas/Facet'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

  /products:
    get:
      operationId: ListProducts
      tags: [catalog]
      summary: List products with category filter, price/brand/rating/shipping filters, pagination, and sort
      parameters:
        - $ref: '#/components/parameters/TraceId'
        - $ref: '#/components/parameters/FilterCategoryId'
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: per_page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - $ref: '#/components/parameters/FilterMinPrice'
        - $ref: '#/components/parameters/FilterMaxPrice'
        - $ref: '#/components/parameters/FilterBrand'
        - $ref: '#/components/parameters/FilterRating'
        - $ref: '#/components/parameters/FilterFreeShipping'
        - $ref: '#/components/parameters/FilterInStock'
        - $ref: '#/components/parameters/FilterPriceDropped'
        - $ref: '#/components/parameters/FilterAttr'
        - $ref: '#/components/parameters/FilterSort'
      responses:
        '200':
          description: Paginated product list
          content:
            application/json:
              schema:
                type: object
                required: [data, pagination]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ProductSummary'
                  pagination:
                    $ref: '#/components/schemas/PaginationMeta'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

    post:
      operationId: CreateProduct
      tags: [catalog, admin]
      summary: Create a new product listing (admin / seller onboarding)
      security:
        - adminAuth: []
      parameters:
        - $ref: '#/components/parameters/TraceId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [seller_id, category_id, brand, default_currency, default_locale]
              properties:
                seller_id:
                  type: integer
                  format: int64
                category_id:
                  type: integer
                  format: int64
                brand:
                  type: string
                default_currency:
                  type: string
                  example: TRY
                default_locale:
                  type: string
                  example: tr-TR
      responses:
        '201':
          description: Product created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalError'

  /products/{id}:
    get:
      operationId: GetProduct
      tags: [catalog]
      summary: Get full product detail including variants and cashback preview
      description: |
        Server resolves `title` and `description` from `Accept-Language` header.
        `cashback_preview.monthly_coin_minor` is computed handler-layer:
        `round(variant.price_minor × commission_pct_bps/10000 × 5000/10000 / 12)`.
        Uses the lowest-priced active variant for the preview amount.
        `seller_name` is joined from the seller module (in-process, core-svc only).
        `image_urls` are CDN-resolved (not raw storage keys).
        `delivery_eta` is a cheap, table-driven pre-purchase delivery estimate
        (P-034) from the seller's dispatch origin to the optional `dest_city`;
        it makes NO carrier call. Omitted (null) when no estimate is available.
      parameters:
        - $ref: '#/components/parameters/TraceId'
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: dest_city
          in: query
          required: false
          description: |
            Destination city for the delivery estimate (P-034). The client passes
            the user's selected delivery city when known; absent (a guest) yields
            the conservative national fallback (delivery_eta.confident = false).
            Case/diacritic-insensitive (folded to an ASCII key server-side).
          schema:
            type: string
      responses:
        '200':
          description: Product detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  # ── Search ────────────────────────────────────────────────────────────────────

  /search/suggest:
    get:
      operationId: SearchSuggest
      tags: [search]
      summary: Structured autocomplete suggestions (debounce 300 ms on client)
      description: |
        Returns structured brand + product suggestions for the search dropdown
        (SE-06). Brands route to the brand-filtered listing; products route to
        the PDP. Both are sourced from the catalog alone.
      parameters:
        - $ref: '#/components/parameters/TraceId'
        - name: q
          in: query
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        '200':
          description: Structured brand + product suggestions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuggestResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /search/trending:
    get:
      operationId: SearchTrending
      tags: [search]
      summary: Current trending search terms
      parameters:
        - $ref: '#/components/parameters/TraceId'
      responses:
        '200':
          description: Trending terms
          content:
            application/json:
              schema:
                type: object
                required: [terms]
                properties:
                  terms:
                    type: array
                    items:
                      type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /search:
    get:
      operationId: Search
      tags: [search]
      summary: Full-text product search with filters
      parameters:
        - $ref: '#/components/parameters/TraceId'
        - name: q
          in: query
          required: true
          schema:
            type: string
            minLength: 1
        - $ref: '#/components/parameters/FilterCategoryId'
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: per_page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - $ref: '#/components/parameters/FilterMinPrice'
        - $ref: '#/components/parameters/FilterMaxPrice'
        - $ref: '#/components/parameters/FilterBrand'
        - $ref: '#/components/parameters/FilterRating'
        - $ref: '#/components/parameters/FilterFreeShipping'
        - $ref: '#/components/parameters/FilterInStock'
        - $ref: '#/components/parameters/FilterPriceDropped'
        - $ref: '#/components/parameters/FilterAttr'
        - $ref: '#/components/parameters/FilterSort'
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                type: object
                required: [data, pagination]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ProductSummary'
                  pagination:
                    $ref: '#/components/schemas/PaginationMeta'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  # ── Discovery ─────────────────────────────────────────────────────────────────

  /banners:
    get:
      operationId: ListBanners
      tags: [discovery]
      summary: Promotional banners for a given placement
      parameters:
        - $ref: '#/components/parameters/TraceId'
        - name: placement
          in: query
          required: false
          schema:
            type: string
            enum: [home, category, checkout]
            default: home
      responses:
        '200':
          description: Banner list
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Banner'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /recommendations:
    get:
      operationId: ListRecommendations
      tags: [discovery]
      summary: Personalised product recommendations for the authenticated user
      parameters:
        - $ref: '#/components/parameters/TraceId'
      responses:
        '200':
          description: Recommendation list (up to 20 items)
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Recommendation'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  # ── Cart ──────────────────────────────────────────────────────────────────────

  /cart:
    get:
      operationId: GetCart
      tags: [cart]
      summary: Get the authenticated user's cart (enriched with product data)
      description: |
        Returns enriched cart items joining variant/product data.
        Per-item `monthly_coin_minor` is the cashback preview.
        `subtotal_minor` and `total_monthly_coin_minor` are pre-computed sums.
      parameters:
        - $ref: '#/components/parameters/TraceId'
      responses:
        '200':
          description: Cart contents
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cart'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /cart/items:
    post:
      operationId: AddCartItem
      tags: [cart]
      summary: Add a variant to the cart; returns the updated enriched cart
      description: |
        Returns the full enriched cart (same schema as GET /cart) in the
        response, eliminating the need for a follow-up GET round-trip.
      parameters:
        - $ref: '#/components/parameters/TraceId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [variant_id, quantity]
              properties:
                variant_id:
                  type: integer
                  format: int64
                quantity:
                  type: integer
                  minimum: 1
      responses:
        '200':
          description: Updated cart
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cart'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          $ref: '#/components/responses/InternalError'

  /cart/items/{variant_id}:
    delete:
      operationId: RemoveCartItem
      tags: [cart]
      summary: Remove a variant from the cart
      parameters:
        - $ref: '#/components/parameters/TraceId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - name: variant_id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Item removed
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          $ref: '#/components/responses/InternalError'

  /cart/reserve:
    post:
      operationId: ReserveCart
      tags: [cart]
      summary: Reserve inventory for all cart items before checkout
      parameters:
        - $ref: '#/components/parameters/TraceId'
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200':
          description: Reservation created (expires in 10 min)
          content:
