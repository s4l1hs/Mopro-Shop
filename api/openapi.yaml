# ── Components ────────────────────────────────────────────────────────────────

components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        HS256 access token. TTL 15 min.
        Claims: sub (user_id as string), iat, exp.
        Issued by POST /auth/otp/verify or POST /auth/token/refresh.
    stepUpAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Short-lived JWT with claim `scope=high_sensitivity`. TTL 5 min.
        Issued by POST /auth/step-up after re-verifying OTP.
        Required for: DELETE /me (account deletion).
        If a regular bearerAuth token is sent instead, the server returns
        403 with code=step_up_required.
    adminAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Admin / internal token. Only for POST /products, POST /orders,
        POST /orders/{id}/refund, and GET /categories/{id}/commission.
        Not exposed to mobile clients.

  parameters:
    IdempotencyKey:
      name: X-Idempotency-Key
      in: header
      required: true
      description: |
        UUIDv7 generated client-side. Server caches the response for 24 hours
        keyed on this value. Duplicate requests within that window return the
        cached response without re-executing the operation.
      schema:
        type: string
        format: uuid
        example: "01926b7f-1234-7abc-8def-0123456789ab"

    TraceId:
      name: X-Trace-Id
      in: header
      required: false
      description: |
        Client-generated trace identifier (UUID or opaque string).
        Echoed in error responses as `error.trace_id`.
        Falls back to a server-generated UUID if absent.
      schema:
        type: string
        example: "4f3a2b1c-e71a-4c3f-b99a-8c3f2a1b7d5e"

    # ── Catalog/search filter + sort params (P-028) ───────────────────────────
    # Shared by GET /products and GET /search so both endpoints filter+sort
    # identically. All optional; omitting one applies no constraint on that
    # dimension. The backend maps an unknown `sort` token to `recommended`
    # (never errors). `bestseller` orders by global popularity (P-029).
    FilterCategoryId:
      name: category_id
      in: query
      required: false
      description: Scope results to a category (optional on /search).
      schema:
        type: integer
        format: int64
    FilterMinPrice:
      name: min_price
      in: query
      required: false
      description: Minimum price in minor units (filters the displayed/lowest variant price).
      schema:
        type: integer
        format: int64
        minimum: 0
    FilterMaxPrice:
      name: max_price
      in: query
      required: false
      description: Maximum price in minor units (filters the displayed/lowest variant price).
      schema:
        type: integer
        format: int64
        minimum: 0
    FilterBrand:
      name: brand
      in: query
      required: false
      description: Repeatable; matches any of the given brands (?brand=Nike&brand=Adidas).
      schema:
        type: array
        items:
          type: string
      style: form
      explode: true
    FilterRating:
      name: rating
      in: query
      required: false
      description: Minimum average rating (products with rating_avg >= this).
      schema:
        type: integer
        minimum: 1
        maximum: 5
    FilterFreeShipping:
      name: free_shipping
      in: query
      required: false
      description: When true, only products flagged free-shipping.
      schema:
        type: boolean
    FilterInStock:
      name: in_stock
      in: query
      required: false
      description: When true, only products with at least one in-stock variant.
      schema:
        type: boolean
    FilterPriceDropped:
      name: price_dropped
      in: query
      required: false
      description: >
        When true, only products whose current (cheapest live) price is below a
        price they carried earlier in the last 30 days — a genuine price drop
        (PLP-14, "Fiyatı düşenler"). Served from catalog_schema.variant_price_history.
      schema:
        type: boolean
    FilterAttr:
      name: attr
      in: query
      required: false
      description: >
        Attribute facet filter (PLP-13). Repeated `<slug>:<value>` entries, e.g.
        `attr=renk:Siyah&attr=renk:Beyaz`. Values within a slug are OR; distinct
        slugs are AND. Backed by catalog_schema.product_attributes.
      style: form
      explode: true
      schema:
        type: array
        items:
          type: string
          example: renk:Siyah
    FilterSort:
      name: sort
      in: query
      required: false
      description: |
        Sort order. Unknown/unsupported tokens fall back to `recommended`.
        `bestseller` orders by global popularity (P-029); it degrades to
        `recommended` until the analytics popularity projection has data.
      schema:
        type: string
        enum: [recommended, bestseller, newest, price_asc, price_desc, cashback_desc]
        default: recommended

  responses:
    BadRequest:
      description: Request is malformed or missing required fields
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'

    Unauthorized:
      description: Missing, invalid, or expired access token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'

    StepUpRequired:
      description: |
        Regular access token provided but step-up token required.
        Client must call POST /auth/step-up to obtain a step-up token.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example:
            error:
              code: step_up_required
              message: "This action requires step-up authentication. Please complete OTP verification."
              trace_id: "4f3a2b1c"

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'

    Conflict:
      description: Request conflicts with current resource state
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'

    UnprocessableEntity:
      description: Request body failed schema or business-rule validation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'

    TooManyRequests:
      description: Rate limit exceeded
      headers:
        Retry-After:
          description: Seconds to wait before retrying
          schema:
            type: integer
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'

    ServiceUnavailable:
      description: |
        System is in read-only mode (maintenance window, migration in progress,
        or circuit breaker open). Retry after the `Retry-After` header value.
      headers:
        Retry-After:
          description: Seconds to wait before retrying
          schema:
            type: integer
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example:
            error:
              code: service_unavailable
              message: "System is temporarily in read-only mode. Please try again shortly."
              trace_id: "4f3a2b1c"

    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'

  schemas:

    # ── Common ────────────────────────────────────────────────────────────────

    FieldError:
      type: object
      description: A field-level validation error within an ErrorEnvelope
      required: [name, message]
      properties:
        name:
          type: string
          example: phone
        message:
          type: string
          example: "must start with +905"

    ErrorEnvelope:
      type: object
      description: Standard error response wrapper used by all error status codes
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, trace_id]
          properties:
            code:
              type: string
              description: Machine-readable error slug
              example: validation_error
            message:
              type: string
              description: Human-readable error message (locale from Accept-Language)
              example: "Telefon numarası geçersiz."
            trace_id:
              type: string
              description: Request trace ID. Echoes X-Trace-Id or server-generated UUID.
              example: "4f3a2b1c-e71a-4c3f-b99a-8c3f2a1b7d5e"
            fields:
              type: array
              description: Per-field validation errors. Present only for 422 responses.
              items:
                $ref: '#/components/schemas/FieldError'

    PaginationMeta:
      type: object
      description: Page-based pagination metadata (used for product browse and order lists)
      required: [page, per_page, total, total_pages]
      properties:
        page:
          type: integer
          minimum: 1
        per_page:
          type: integer
          minimum: 1
          maximum: 100
        total:
          type: integer
          format: int64
        total_pages:
          type: integer
          minimum: 0

    CursorPaginationMeta:
      type: object
      description: Cursor-based pagination metadata (used for wallet transactions and cashback payments)
      required: [has_more]
      properties:
        has_more:
          type: boolean
        next_cursor:
          type: string
          nullable: true
          description: |
            Opaque base64-encoded cursor. Pass as `cursor=` on the next request.
            Null when has_more=false. Never parse or construct manually.

    # ── Auth schemas ──────────────────────────────────────────────────────────

    TokenPair:
      type: object
      required: [access_token, token_type, expires_in, refresh_token, refresh_expires_at]
      properties:
        access_token:
          type: string
        token_type:
          type: string
          enum: [Bearer]
        expires_in:
          type: integer
          description: "Seconds until access token expiry. Always 900 (15 min)."
          example: 900
        refresh_token:
          type: string
        refresh_expires_at:
          type: string
          format: date-time

    StepUpTokenResponse:
      type: object
      required: [step_up_token, expires_in]
      properties:
        step_up_token:
          type: string
          description: Bearer token with scope=high_sensitivity. Use as Authorization header.
        expires_in:
          type: integer
          description: "Seconds until step-up token expiry. Always 300 (5 min)."
          example: 300

    # ── User / Identity ───────────────────────────────────────────────────────

    User:
      type: object
      required: [id, phone, locale, created_at, updated_at]
      properties:
        id:
          type: integer
          format: int64
        phone:
          type: string
          example: "+905321234567"
        name_first:
          type: string
          nullable: true
        name_last:
          type: string
          nullable: true
        email:
          type: string
          format: email
          nullable: true
        locale:
          type: string
          example: tr-TR
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        seller_binding:
          allOf:
            - $ref: '#/components/schemas/SellerBinding'
          nullable: true
          description: |
            The user's seller-account binding, or null when the user is not bound
            to an active seller. Drives client-side seller-role detection.

    SellerBinding:
      type: object
      description: A user's link to a seller account (seller_users row + seller identity).
      required: [seller_id, seller_slug, seller_name, role]
      properties:
        seller_id:
          type: integer
          format: int64
        seller_slug:
          type: string
        seller_name:
          type: string
        role:
          type: string
          enum: [owner, staff]

    Device:
      type: object
      required: [id, fcm_token, device_model, os_version, created_at]
      properties:
        id:
          type: integer
          format: int64
        fcm_token:
          type: string
        device_model:
          type: string
          example: "Samsung Galaxy S25"
        os_version:
          type: string
          example: "Android 16"
        created_at:
          type: string
          format: date-time

    # ── Address ───────────────────────────────────────────────────────────────

    Address:
      type: object
      required: [id, label, name, phone, city, district, full_address, is_default]
      properties:
        id:
          type: integer
          format: int64
        label:
          type: string
          example: "Ev"
        name:
          type: string
        phone:
          type: string
        city:
          type: string
        district:
          type: string
        neighborhood:
          type: string
          nullable: true
        full_address:
          type: string
        postal_code:
          type: string
          nullable: true
        is_default:
          type: boolean

    AddressInput:
      type: object
      required: [label, name, phone, city, district, full_address]
      properties:
        label:
          type: string
          example: "Ev"
        name:
          type: string
        phone:
          type: string
        city:
          type: string
        district:
          type: string
        neighborhood:
          type: string
        full_address:
          type: string
        postal_code:
          type: string
        is_default:
          type: boolean
          default: false

    # ── Catalog ───────────────────────────────────────────────────────────────

    Category:
      type: object
      required: [id, name, slug, commission_pct_bps]
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
          description: Locale-resolved category name
        slug:
          type: string
        parent_id:
          type: integer
          format: int64
          nullable: true
        icon_url:
          type: string
          format: uri
          nullable: true
        commission_pct_bps:
          type: integer
          description: Commission rate in basis points (e.g. 1500 = 15%)
        promo_slot:
          $ref: '#/components/schemas/CategoryPromoSlot'
          nullable: true
          description: |
            Optional promo card surfaced ONLY on top-level categories
            (parent_id IS NULL). Always null on subcategories and leaves.
            Used by the desktop mega menu's 3+1 layout (Session 4d §3);
            mobile clients can ignore. Malformed JSON in the underlying
            storage is normalized to null + a warning log by the server.

    CategoryPromoSlot:
      type: object
      required: [image_url, title, deep_link]
      description: |
        Promo card payload for the desktop mega menu's 3+1 layout. All
        fields required when the slot is populated; absence of the slot
        itself is null on the parent Category.
      properties:
        image_url:
          type: string
          format: uri
          description: 16:9 image URL. Mobile clients should treat as opaque.
        title:
          type: string
          description: 2-line clamp display title.
        deep_link:
          type: string
          description: In-app deep link for the CTA button.

    CategoryCommission:
      type: object
      required: [category_id, market, commission_pct_bps, kdv_pct_bps]
      properties:
        category_id:
          type: integer
          format: int64
        market:
          type: string
          example: TR
        commission_pct_bps:
          type: integer
          description: Commission rate in basis points
        kdv_pct_bps:
          type: integer
          description: KDV (VAT) rate in basis points

    CashbackPreview:
      type: object
      description: |
        Preview of the perpetual monthly cashback amount for a product.
        Computed handler-layer using the formula:
        round(lowest_variant_price_minor × commission_pct_bps/10000 × 5000/10000 / 12).
        Not a committed plan; serves as a display hint.
      required: [monthly_coin_minor, currency]
      properties:
        monthly_coin_minor:
          type: integer
          format: int64
        currency:
          type: string
          example: TRY_COIN

    FacetValue:
      type: object
      description: One (value, count) bucket within a facet (PLP-13).
      required: [value, count]
      properties:
        value:
          type: string
        count:
          type: integer
          minimum: 0
          description: Distinct products in the category subtree carrying this value.

    Facet:
      type: object
      description: |
        A facetable attribute for a category with its value buckets (PLP-13),
        ordered by display_order then descending count. Drives the filter accordions.
      required: [slug, name, values]
      properties:
        slug:
          type: string
          example: renk
        name:
          type: string
          description: Locale-resolved attribute name (name_tr/name_en).
          example: Renk
        values:
          type: array
          items:
            $ref: '#/components/schemas/FacetValue'

    ProductAttribute:
      type: object
      description: |
        One attribute of a product (PLP-13) — slug + locale-resolved name + its
        value(s). Feeds the PDP specs tab (PD-01). Per-product, no counts.
      required: [slug, name, values]
      properties:
        slug:
          type: string
          example: renk
        name:
          type: string
          example: Renk
        values:
          type: array
          items:
            type: string
          example: [Siyah, Beyaz]

    Variant:
      type: object
      required: [id, sku, price_minor, price_currency, stock, image_urls]
      properties:
        id:
          type: integer
          format: int64
        sku:
          type: string
        color:
          type: string
          nullable: true
        size:
          type: string
          nullable: true
        price_minor:
          type: integer
          format: int64
          description: Price in minor units (kuruş)
        price_currency:
          type: string
          example: TRY
        stock:
          type: integer
          minimum: 0
        image_urls:
          type: array
          description: CDN-resolved full URLs. Never raw storage keys.
          items:
            type: string
            format: uri
        original_price_minor:
          type: integer
          format: int64
          nullable: true
          description: |
            Original/list (MSRP) price in minor units. When set and greater than
            price_minor the variant is discounted — render a strikethrough on
            original_price_minor in the PDP buy-box (PDP-strikethrough). Omitted
            when the variant was never marked down.
        lowest_30d_price_minor:
          type: integer
          format: int64
          nullable: true
          description: |
            Lowest price (minor units) applied to THIS variant in the last 30 days
            (TR 6502 / EU Omnibus, P-030). Per-variant so the PDP — which shows a
            specific selected variant — is accurate. Omitted when no in-window
            history; equals price_minor until the price changes (P-032).

    Product:
      type: object
      description: |
        Full product detail. Title and description are locale-resolved server-side.
        cashback_preview uses the lowest-priced active variant.
        seller_name is joined from the seller module (in-process, core-svc only).
      required: [id, seller_id, seller_name, category_id, brand, status, title,
                 description, variants, attributes, cashback_preview, created_at]
      properties:
        id:
          type: integer
          format: int64
        seller_id:
          type: integer
          format: int64
        seller_name:
          type: string
        seller_official:
          type: boolean
          default: false
          description: |
            When true, the seller is an official/verified storefront — render the
            "Resmi Satıcı" badge on the PDP seller card (PD-04). From
            seller_schema.sellers.is_official, resolved in-process (no JOIN, §5).
        seller_slug:
          type: string
          nullable: true
          description: |
            URL-safe identifier for the seller; used to deep-link to the seller
            storefront at /sellers/:slug. Null when the product's seller_id does
            not resolve to an active seller (legacy/platform-direct or suspended).
        category_id:
          type: integer
          format: int64
        brand:
          type: string
        status:
          type: string
          enum: [active, inactive, draft]
        title:
          type: string
          description: Locale-resolved from Accept-Language header
        description:
          type: string
          description: Locale-resolved. Falls back to tr-TR if requested locale unavailable.
        variants:
          type: array
          items:
            $ref: '#/components/schemas/Variant'
        attributes:
          type: array
          description: |
            Normalized product attributes (PLP-13) for the specs tab (PD-01) —
            slug + locale-resolved name + value(s). Empty array when the product
            has no attributes.
          items:
            $ref: '#/components/schemas/ProductAttribute'
        cashback_preview:
          $ref: '#/components/schemas/CashbackPreview'
        delivery_eta:
          allOf:
            - $ref: '#/components/schemas/DeliveryEta'
          nullable: true
          description: |
            Pre-purchase delivery estimate (P-034). Null when no estimate is
            available. Not a delivery SLA — `confident=false` ranges are
            fallback estimates the UI hedges as "tahmini".
        created_at:
          type: string
          format: date-time

    DeliveryEta:
      type: object
      description: |
        Cheap, table-driven pre-purchase delivery estimate in transit business
        days (P-034). Computed from the seller dispatch origin + optional
        destination via a static ref_schema lookup — NO carrier call. An estimate,
        never a committed SLA.
      required: [min_days, max_days, confident]
      properties:
        min_days:
          type: integer
          minimum: 0
          description: Lower bound of the transit business-day estimate.
        max_days:
          type: integer
          minimum: 0
          description: Upper bound of the transit business-day estimate.
        confident:
          type: boolean
          description: |
            true when derived from a concrete origin×destination transit row;
            false when it is the conservative national fallback (unknown origin
            or destination, e.g. a guest with no address).
        dispatch_city:
          type: string
          nullable: true
          description: |
            Normalized key of the seller's dispatch city, for an optional
            "{city}'dan gönderilir" line. Omitted when the origin is unknown.

    BrandSuggestion:
      type: object
      description: |
        A single brand autocomplete row (SE-06). Brand is a plain product
        attribute (no brand entity); a tapped suggestion routes to the
        brand-filtered listing.
      required: [name, product_count]
      properties:
        name:
          type: string
          description: Brand name
        product_count:
          type: integer
          description: Number of active products carrying this brand

    SuggestResponse:
      type: object
      description: Structured search autocomplete payload (SE-06).
      required: [brands, products]
      properties:
        brands:
          type: array
          description: Matching brands, ordered by active-product count desc
          items:
            $ref: '#/components/schemas/BrandSuggestion'
        products:
          type: array
          description: Top matching product summaries (route to PDP)
          items:
            $ref: '#/components/schemas/ProductSummary'

    ProductSummary:
      type: object
      description: Lightweight product representation for list / search results
      required: [id, seller_id, category_id, brand, status, title,
                 price_minor, price_currency, cashback_preview]
      properties:
        id:
          type: integer
          format: int64
        seller_id:
          type: integer
          format: int64
        category_id:
          type: integer
          format: int64
        brand:
          type: string
        status:
          type: string
          enum: [active, inactive, draft]
        title:
          type: string
          description: Locale-resolved
        price_minor:
          type: integer
          format: int64
          description: Lowest-priced active variant price in minor units
        price_currency:
          type: string
        cover_image_url:
          type: string
          format: uri
          nullable: true
          description: First image URL of the lowest-priced variant
        # ── Trendyol-style display fields (Session 2 backend, Session 3 spec) ──
        original_price_minor:
          type: integer
          format: int64
          nullable: true
          description: |
            MSRP in minor units. When set and greater than price_minor, render
            with strikethrough; backend also emits discount_pct.
        discount_pct:
          type: integer
          nullable: true
          description: |
            Server-computed discount % when original_price_minor > price_minor.
            Render as red %-badge next to the strikethrough.
        rating_avg:
          type: number
          format: float
          nullable: true
          description: Average review rating (0.0–5.0); null when rating_count = 0
        rating_count:
          type: integer
          default: 0
          description: Number of reviews aggregated into rating_avg
        flash_price_minor:
          type: integer
          format: int64
          nullable: true
          description: |
            Flash-deal price in minor units; set only for products served by the
            /home/flash-deals rail. When present, render this as the price and
            price_minor as the strikethrough original.
        free_shipping:
          type: boolean
          default: false
          description: |
            When true, render the "Kargo Bedava" (free-shipping) badge (P-009).
            Sourced from the products.free_shipping flag.
        favorites_count:
          type: integer
          default: 0
          description: |
            Number of users who favorited this product — social proof by the
            heart on the card / PDP (P-004). Zero when none.
        is_bestseller:
          type: boolean
          default: false
          description: |
            When true, render the "Çok Satan" bestseller stamp on the card (G-3).
            Sourced from the products.is_bestseller flag.
        is_official_seller:
          type: boolean
          default: false
          description: |
            When true, the product's seller is official/verified — render the
            "Resmi Satıcı" badge on the card (PLP-17). App-merged per page from
            seller_schema (no cross-schema JOIN, §5).
        basket_discount_pct:
          type: integer
          nullable: true
          description: |
            Extra discount percentage applied at the basket — renders the
            "Sepette %X İndirim" pill (G-3). Omitted when null (no pill).
            Sourced from the products.basket_discount_pct column.
        lowest_30d_price_minor:
          type: integer
          format: int64
          nullable: true
          description: |
            Lowest price (minor units) applied in the last 30 days, for compliant
            display of price reductions (TR 6502 / EU Omnibus 2019/2161, P-030).
            Omitted when no in-window price history. The frontend shows the
            "30 günün en düşük fiyatı" line only when this is below price_minor —
            today it equals price_minor for every product (prices are immutable
            post-creation, so history has not yet diverged from the baseline).
        cashback_preview:
          $ref: '#/components/schemas/CashbackPreview'

    # ── Cart ──────────────────────────────────────────────────────────────────

    CartItem:
      type: object
      description: Enriched cart line item. Domain CartItem has only variant_id + qty; enrichment is handler-layer.
      required: [variant_id, product_id, title, price_minor, price_currency,
                 quantity, monthly_coin_minor, coin_currency]
      properties:
        variant_id:
          type: integer
          format: int64
        product_id:
          type: integer
          format: int64
        title:
          type: string
        image_url:
          type: string
          format: uri
          nullable: true
        color:
          type: string
          nullable: true
        size:
          type: string
          nullable: true
        price_minor:
          type: integer
          format: int64
        price_currency:
          type: string
        quantity:
          type: integer
          minimum: 1
        monthly_coin_minor:
          type: integer
          format: int64
          description: Cashback preview per item per month
        coin_currency:
          type: string
          example: TRY_COIN

    Cart:
      type: object
      required: [user_id, items, subtotal_minor, subtotal_currency,
                 total_monthly_coin_minor, coin_currency]
      properties:
        user_id:
          type: integer
          format: int64
        items:
          type: array
          items:
            $ref: '#/components/schemas/CartItem'
        subtotal_minor:
          type: integer
          format: int64
          description: Sum of price_minor × quantity across all items
        subtotal_currency:
          type: string
        total_monthly_coin_minor:
          type: integer
          format: int64
          description: Sum of monthly_coin_minor across all items
        coin_currency:
          type: string
          example: TRY_COIN

    Reservation:
      type: object
      required: [id, expires_at]
      properties:
        id:
          type: string
          description: Reservation ID; pass to POST /orders or POST /orders/checkout
        expires_at:
          type: string
          format: date-time
          description: Reservation is released automatically after this time (typically 10 min)

    # ── Checkout / Orders ─────────────────────────────────────────────────────

    CheckoutRequest:
      type: object
      required: [address_id, cargo_option, payment_method]
      properties:
        address_id:
          type: integer
          format: int64
        cargo_option:
          type: string
          enum: [aras, yurtici, surat, mng, hepsijet, ptt]
        payment_method:
          type: object
          required: [type]
          properties:
            type:
              type: string
              enum: [card, coin_balance]
            saved_card_id:
              type: string
              nullable: true
              description: PSP-tokenized card ID. Required when type=card and using a saved card.

    CheckoutResponse:
      type: object
      required: [order_id, status, total_minor, currency, payment]
      properties:
        order_id:
          type: integer
          format: int64
        status:
          type: string
          enum: [awaiting_payment, confirmed]
        total_minor:
          type: integer
          format: int64
        currency:
          type: string
        payment:
          type: object
          required: [requires_3ds]
          properties:
            requires_3ds:
              type: boolean
            redirect_url:
              type: string
              format: uri
              nullable: true
              description: PSP 3DS redirect URL. Null when requires_3ds=false.

    OrderItem:
      type: object
      required: [id, variant_id, product_id, title, quantity,
                 price_minor, price_currency, commission_pct_bps]
      properties:
        id:
          type: integer
          format: int64
        variant_id:
          type: integer
          format: int64
        product_id:
          type: integer
          format: int64
        title:
          type: string
        quantity:
          type: integer
          minimum: 1
        price_minor:
          type: integer
          format: int64
        price_currency:
          type: string
        commission_pct_bps:
          type: integer
          description: "Snapshotted at sale time from ref_schema.commission_rules. Never changes after order creation."

    Order:
      type: object
      required: [id, user_id, status, items, total_minor, currency, created_at]
      properties:
        id:
          type: integer
          format: int64
        user_id:
          type: integer
          format: int64
        status:
          type: string
          enum: [pending_payment, paid, shipped, delivered, cancelled, refunded, partially_refunded]
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'
        total_minor:
          type: integer
          format: int64
        currency:
          type: string
        cargo_option:
          type: string
          nullable: true
          enum: [aras, yurtici, surat, mng, hepsijet, ptt]
        cashback_unlock_at:
          type: string
          format: date-time
          nullable: true
          description: |
            When the cashback plan becomes active.
            Computed as delivered_at + 3 business days (TR calendar).
            Null until the order is delivered.
        delivered_at:
          type: string
          format: date-time
          nullable: true
        delivery_address:
          allOf:
            - $ref: '#/components/schemas/DeliveryAddress'
          nullable: true
          description: |
            Immutable ship-to snapshot captured at checkout (OR-02). Null for legacy
            orders created before address capture. A frozen copy, NOT a live reference
            to the user's (mutable) saved address.
        created_at:
          type: string
          format: date-time

    DeliveryAddress:
      type: object
      description: Frozen as-of-purchase delivery-address snapshot on an order (OR-02).
      required: [recipient_name, full_address, district, city]
      properties:
        label:
          type: string
          description: User's label for the address (e.g. "Ev", "İş").
        recipient_name:
          type: string
        phone:
          type: string
        full_address:
          type: string
        neighborhood:
          type: string
        district:
          type: string
        city:
          type: string
        postal_code:
          type: string

    ReturnRequest:
      type: object
      required: [reason]
      properties:
        reason:
          type: string
          enum: [wrong_product, not_as_described, damaged, size_issue, changed_mind, other]
        description:
          type: string
        items:
          type: array
          description: Specific items and quantities to return. If absent, full order return.
          items:
            type: object
            required: [order_item_id, quantity]
            properties:
              order_item_id:
                type: integer
                format: int64
              quantity:
                type: integer
                minimum: 1

    Return:
      type: object
      required: [id, order_id, status, reason, created_at]
      properties:
        id:
          type: integer
          format: int64
        order_id:
          type: integer
          format: int64
        status:
          type: string
          enum: [pending, approved, rejected, refunded]
        reason:
          type: string
        description:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time

    # ── Seller ────────────────────────────────────────────────────────────────

    SellerOrderBreakdown:
      type: object
      description: Per-seller order transparency breakdown for the seller panel
      required: [order_id, items, totals, unlock_at]
      properties:
        order_id:
          type: integer
          format: int64
        items:
          type: array
          items:
            type: object
            required: [product_title, quantity, gross_minor, commission_minor,
                       kdv_minor, service_fee_minor, net_minor, currency]
            properties:
              product_title:
                type: string
              quantity:
                type: integer
              gross_minor:
                type: integer
                format: int64
              commission_minor:
                type: integer
                format: int64
              commission_pct:
                type: number
                format: float
              kdv_minor:
                type: integer
                format: int64
              service_fee_minor:
                type: integer
                format: int64
                description: "Always 0 for Mopro. Non-zero in competitor comparison."
              net_minor:
                type: integer
                format: int64
              currency:
                type: string
        totals:
          type: object
          required: [gross_minor, commission_minor, kdv_minor, net_minor, currency]
          properties:
            gross_minor:
              type: integer
              format: int64
            commission_minor:
              type: integer
              format: int64
            kdv_minor:
              type: integer
              format: int64
            net_minor:
              type: integer
              format: int64
            currency:
              type: string
        unlock_at:
          type: string
          format: date-time
          description: Payout unlock date — delivered_at + 3 business days (TR calendar)

    # ── Discovery ─────────────────────────────────────────────────────────────

    Banner:
      type: object
      required: [id, placement, image_url, action_type]
      properties:
        id:
          type: integer
          format: int64
        placement:
          type: string
          example: home
        image_url:
          type: string
          format: uri
        action_type:
          type: string
          enum: [deeplink, external, none]
        action_url:
          type: string
          nullable: true
          description: Deep link path or external URL; null when action_type=none
        expires_at:
          type: string
          format: date-time
          nullable: true

    Recommendation:
      type: object
      required: [product]
      properties:
        score:
          type: number
          format: float
          nullable: true
          description: Internal ranking score (opaque; may be omitted)
        product:
          $ref: '#/components/schemas/ProductSummary'

    # ── Wallet ────────────────────────────────────────────────────────────────

    WalletBalance:
      type: object
      required: [currency, amount_minor, last_updated_at]
      properties:
        currency:
          type: string
          example: TRY_COIN
        amount_minor:
          type: integer
          format: int64
        last_updated_at:
          type: string
          format: date-time

    WalletTransaction:
      type: object
      required: [id, type, amount_minor, currency, occurred_at]
      properties:
        id:
          type: integer
          format: int64
        type:
          type: string
          enum: [credit, debit]
        amount_minor:
          type: integer
          format: int64
        currency:
          type: string
        description:
          type: string
          nullable: true
        reference_id:
          type: integer
          format: int64
          nullable: true
          description: plan_id for cashback credits; payout_id for debits. Null for manual adjustments.
        reference_type:
          type: string
          nullable: true
          enum: [cashback_payment, payout, adjustment]
        occurred_at:
          type: string
          format: date-time

    # ── Cashback ──────────────────────────────────────────────────────────────

    CashbackPlan:
      type: object
      required: [id, order_id, product_id, product_title, monthly_amount_minor,
                 currency, status, start_date, reference_interest_rate_bps, created_at]
      properties:
        id:
          type: integer
          format: int64
        order_id:
          type: integer
          format: int64
        product_id:
          type: integer
          format: int64
        product_title:
          type: string
        product_image_url:
          type: string
          format: uri
          nullable: true
        monthly_amount_minor:
          type: integer
          format: int64
        currency:
          type: string
          example: TRY_COIN
        status:
          type: string
          enum: [active, cancelled, suspended]
        start_date:
          type: string
          format: date
          description: "ISO 8601 date (YYYY-MM-DD). First instalment paid on or after this date."
        reference_interest_rate_bps:
          type: integer
          description: |
            Reference rate in basis points (5000 = 50%). Frozen at plan creation
            time per the v6 perpetual cashback formula. Existing plans retain
            their original rate even if the platform's reference rate changes
            later. See LEDGER_GUIDE.md §3.4 for the formula derivation.
        created_at:
          type: string
          format: date-time

    CashbackPayment:
      type: object
      required: [id, plan_id, period_yyyymm, amount_minor, currency, status]
      properties:
        id:
          type: integer
          format: int64
        plan_id:
          type: integer
          format: int64
        period_yyyymm:
          type: string
          pattern: '^\d{6}$'
          example: "202601"
          description: "Year-month of the payment period. e.g. 202601 = January 2026."
        amount_minor:
          type: integer
          format: int64
        currency:
          type: string
        status:
          type: string
          enum: [scheduled, paid, failed]
        paid_at:
          type: string
          format: date-time
          nullable: true
