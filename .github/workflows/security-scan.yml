name: security-scan

# Go dependency/stdlib CVE scanning via govulncheck on every push and PR to main.
#
# govulncheck has no -severity flag. With the default symbol-level scan it reports
# ONLY vulnerabilities whose affected symbols are actually reachable from our code
# (the high-confidence, actionable set) and exits non-zero (code 3) when it finds
# any. That non-zero exit fails this job — so a reachable vulnerability blocks the
# build. Informational-only findings (vuln present in a dep but not called) are
# printed under "Informational" but do NOT change the exit code.
#
# NOTE: overlaps with .github/workflows/govulncheck.yml (PR + weekly schedule).
# This workflow adds the push-to-main trigger requested for the security gate.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  govulncheck:
    name: govulncheck ./...
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: |
          set -o pipefail
          govulncheck ./... | tee "$GITHUB_STEP_SUMMARY"
