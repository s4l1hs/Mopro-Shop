name: golden-rebaseline

# Manually-triggered re-baseline of Flutter goldens on the SAME platform CI
# uses (ubuntu-latest), so committed baselines are pixel-identical to what the
# `flutter test` gate renders. Run from the Actions tab → "Run workflow" on the
# branch you want to re-baseline. See CONTRIBUTING.md ("Goldens").
on:
  workflow_dispatch:

# MUST equal flutter-ci.yml's FLUTTER_VERSION — goldens are baselined here and
# compared by the `golden` job; a version mismatch reintroduces the pixel skew
# (CI-hygiene-2). KEEP IN SYNC with flutter-ci.yml / make-verify.yml / openapi-ci.yml.
env:
  FLUTTER_VERSION: "3.44.1"

jobs:
  rebaseline:
    name: Re-baseline goldens (linux)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
          # Default GITHUB_TOKEN — no PAT needed. Golden tests are now an
          # INFORMATIONAL check (flutter-ci.yml `golden` job), so the re-baseline
          # commit never has to re-trigger a *required* gate (the old recursion-guard
          # reason for a PAT, CUTOVER_LEDGER §5). A GITHUB_TOKEN push lands the
          # re-baselined goldens fine — on a branch or directly on `main`. A PAT
          # remains an optional nice-to-have (auto-retrigger checks on PR branches);
          # nothing depends on it.

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Install deps
        working-directory: mobile
        run: flutter pub get

      - name: Regenerate goldens (+ platform sidecars) on linux
        working-directory: mobile
        run: flutter test --update-goldens

      - name: Commit re-baselined goldens
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add 'mobile/test/**/goldens/*.png' 'mobile/test/**/goldens/*.png.meta'
          if git diff --cached --quiet; then
            echo "No golden changes to commit."
          else
            git commit -m "test(goldens): re-baseline on ubuntu-latest via golden-rebaseline workflow"
            git push
          fi
