name: nightly-soak

# Nightly soak (TOOLING_AUDIT T3-6): runs the concurrency-sensitive suites Step 2
# flagged (§6.3) under -race with a high -count to surface flakes/races that a
# single PR run (-count=1) misses. Not a PR gate — it runs on a schedule and on
# manual dispatch, and opens an issue if it fails so a flake doesn't vanish.
on:
  schedule:
    - cron: '0 3 * * *'   # 03:00 UTC daily (low-traffic window)
  workflow_dispatch:
    inputs:
      count:
        description: 'soak -count (default 50)'
        default: '50'

permissions:
  contents: read
  issues: write   # open an issue on failure

jobs:
  soak:
    name: race soak (-count)
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: soak
        run: make soak SOAK_COUNT=${{ github.event.inputs.count || '50' }}
      - name: Open issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --title "Nightly soak failed — $(date -u +%F)" \
            --body "The nightly make soak (-race -count) failed — a Step 2 hardened suite (wallet RefreshWorker / payment reconciler / identity rate-limiter) regressed or flaked. Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            || echo "issue create failed (non-fatal)"
