name: govulncheck

# Dependency-CVE scanning for the Go module (TOOLING_AUDIT T-003).
# golangci's gosec lints code patterns; nothing here scanned KNOWN-vulnerable
# deps/stdlib until now. Runs on Go-affecting PRs, on every push to main (the
# security gate — a merge can pull in a vulnerable dep regardless of paths), and
# weekly (vulns surface on the DB's schedule, not ours). This is the single
# canonical govulncheck workflow (security-scan.yml was a duplicate, removed).
on:
  push:
    branches: [main]
  # No PR path filter: `govulncheck ./...` is a REQUIRED gate, so it must post a
  # status on every PR (a required check that never runs blocks the merge).
  pull_request:
  schedule:
    - cron: '17 6 * * 1'   # Mondays 06:17 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  govulncheck:
    name: govulncheck ./...
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      # Required gate (TOOLING_AUDIT T-014 resolved): the go directive is 1.25.11
      # (installed here via go-version-file), which fixes the previously-called
      # stdlib vulns. govulncheck must stay clean — no continue-on-error.
      - name: govulncheck
        run: |
          set -o pipefail
          govulncheck ./... | tee "$GITHUB_STEP_SUMMARY"
