name: govulncheck

# Dependency-CVE scanning for the Go module (TOOLING_AUDIT T-003).
# golangci's gosec lints code patterns; nothing here scanned KNOWN-vulnerable
# deps/stdlib until now. Runs on Go-affecting PRs and weekly (vulns surface on
# the DB's schedule, not ours).
on:
  pull_request:
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/govulncheck.yml'
  schedule:
    - cron: '17 6 * * 1'   # Mondays 06:17 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  govulncheck:
    name: govulncheck ./...
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      # Required gate (TOOLING_AUDIT T-014 resolved): the go directive is 1.25.11
      # (installed here via go-version-file), which fixes the previously-called
      # stdlib vulns. govulncheck must stay clean — no continue-on-error.
      - name: govulncheck
        run: |
          set -o pipefail
          govulncheck ./... | tee "$GITHUB_STEP_SUMMARY"
