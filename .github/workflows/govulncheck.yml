name: govulncheck

# Dependency-CVE scanning for the Go module (TOOLING_AUDIT T-003).
# golangci's gosec lints code patterns; nothing here scanned KNOWN-vulnerable
# deps/stdlib until now. Runs on Go-affecting PRs and weekly (vulns surface on
# the DB's schedule, not ours).
on:
  pull_request:
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/govulncheck.yml'
  schedule:
    - cron: '17 6 * * 1'   # Mondays 06:17 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  govulncheck:
    name: govulncheck ./...
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      # continue-on-error: main currently has 2 CALLED stdlib vulns
      # (GO-2026-5039 net/textproto, GO-2026-5037 crypto/x509), tracked as
      # TOOLING_AUDIT T-014 — both fixed by a Go 1.26.4 toolchain bump.
      # REMOVE continue-on-error (make this a required gate) once T-014 lands.
      - name: govulncheck
        continue-on-error: true
        run: |
          set -o pipefail
          govulncheck ./... | tee "$GITHUB_STEP_SUMMARY"
