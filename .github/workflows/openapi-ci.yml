name: OpenAPI Contract

on:
  push:
    branches: [main]
    paths:
      - "api/**"
      - "internal/api/**"
      # core-svc handlers — the live-handler contract tests validate their
      # responses against the spec, so a handler-only change must run them
      # (this is the PD-06 class: a handler drifting from the spec).
      - "cmd/core-svc/**"
      - "mobile/packages/mopro_api/**"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/openapi-ci.yml"
  # No PR path filter: "Go build + contract tests" + "Generated files in sync" are
  # REQUIRED gates, so they must post a status on every PR (a required check that
  # never runs blocks the merge). They validate the merged result.
  pull_request:

# Pin the same exact Flutter version as the rest of CI (CI-hygiene-2).
# KEEP IN SYNC with flutter-ci.yml / golden-rebaseline.yml / make-verify.yml.
env:
  FLUTTER_VERSION: "3.44.1"

jobs:
  lint-spec:
    name: Spectral OpenAPI lint
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - name: Run Spectral
        run: npx --yes @stoplight/spectral-cli@6 lint api/openapi.yaml --ruleset api/.spectral.yaml
        # 0 errors required; warnings are acceptable

  generated-sync:
    name: Generated files in sync
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Re-generate Go types + server stubs
        run: |
          go run github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen@v2.4.1 \
            --config api/oapi-codegen-models.yaml api/openapi.yaml
          go run github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen@v2.4.1 \
            --config api/oapi-codegen-core.yaml api/openapi.yaml
          go run github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen@v2.4.1 \
            --config api/oapi-codegen-fin.yaml api/openapi.yaml

      - name: Re-generate Dart client
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/local \
            openapitools/openapi-generator-cli:v7.10.0 generate \
            -i /local/api/openapi.yaml \
            -g dart-dio \
            -o /local/mobile/packages/mopro_api \
            --additional-properties=pubName=mopro_api,nullSafe=true,serializationLibrary=json_serializable,hideGenerationTimestamp=true \
            --skip-validate-spec

      - name: Diff check — generated files must match committed files
        run: |
          git diff --exit-code internal/api/gen/ mobile/packages/mopro_api/ || \
            (echo "" && \
             echo "ERROR: Generated files are out of sync with api/openapi.yaml." && \
             echo "Run 'make api-gen' locally and commit the result." && \
             exit 1)

  go-build:
    name: Go build + contract tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build all binaries
        run: |
          go build -o /tmp/core-svc ./cmd/core-svc
          go build -o /tmp/fin-svc  ./cmd/fin-svc
          go build -o /tmp/jobs-svc ./cmd/jobs-svc

      - name: Unit tests (race detector)
        run: go test -race ./...

      - name: Contract tests
        # Spec-fixture conformance (internal/api) + live-handler conformance
        # (cmd/core-svc: GET /products/{id} etc. validated against the OpenAPI
        # schema, catching server↔spec drift like PD-06).
        run: go test -tags=contract -v -run TestContract ./internal/api/... ./cmd/core-svc/...

  dart-analyze:
    name: Flutter analyze (dart-dio client)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Get dependencies
        working-directory: mobile/packages/mopro_api
        run: flutter pub get

      - name: Run build_runner (generate .g.dart files)
        working-directory: mobile/packages/mopro_api
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Flutter analyze
        working-directory: mobile/packages/mopro_api
        run: flutter analyze
