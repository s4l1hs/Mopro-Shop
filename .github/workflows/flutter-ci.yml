name: Flutter CI

# No path filter: these jobs are REQUIRED branch-protection gates, so they must
# post a status on EVERY PR (a required check that never runs blocks the merge).
# They validate the merged result and pass on unrelated PRs.
on:
  push:
    branches: [main]
  pull_request:

defaults:
  run:
    working-directory: mobile

jobs:
  analyze:
    name: flutter analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable
      - run: flutter pub get
      # Errors + warnings stay fatal (a non-compiling PR fails here); the 199
      # pre-existing very_good_analysis infos are tolerated so this job is
      # green-on-compile and can be a required check (F-022b). Clearing the
      # infos is a separate DEFER'd task.
      - run: flutter analyze --no-fatal-infos

  codegen:
    name: build_runner (verify generated files up-to-date)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable
      - run: flutter pub get
      - run: dart run build_runner build
      - name: Fail if generated files changed
        run: |
          git diff --exit-code || \
            (echo "Generated files are out of date. Run build_runner locally." && exit 1)
      # GEN-SYNC: build_runner only processes the package it runs in, so the app
      # step above never regenerated the mopro_api path-dependency package — its
      # .g.dart silently drifted (the merch deserializer bug). Regenerate the
      # package too and fail on any drift.
      - name: build_runner — mopro_api package
        working-directory: mobile/packages/mopro_api
        run: |
          dart pub get
          dart run build_runner build --delete-conflicting-outputs
      - name: Fail if mopro_api generated files changed
        working-directory: mobile/packages/mopro_api
        run: |
          git diff --exit-code . || \
            (echo "mopro_api generated files are out of date. Run build_runner in mobile/packages/mopro_api." && exit 1)

  # Logic gate (REQUIRED): everything except golden (pixel) tests. A golden flip
  # on an intentional UI change must never block a merge — goldens run in the
  # informational `golden` job below. Keeping this job named "flutter test" lets
  # it stay the required context under the same name.
  test:
    name: flutter test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable
      - run: flutter pub get
      - run: dart run build_runner build
      - run: flutter test --exclude-tags golden

  # Golden (pixel) tests — INFORMATIONAL only (never a required check). A golden
  # flip turns this red without blocking the merge; re-baseline via the
  # `golden-rebaseline` workflow (no PAT needed). See docs/internal/gate-finalize.md.
  golden:
    name: flutter golden (informational)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable
      - run: flutter pub get
      - run: dart run build_runner build
      - run: flutter test --tags golden

  dart-analyze-generated-client:
    name: dart analyze (mopro_api generated client)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable
      - name: pub get in mopro_api package
        run: flutter pub get
        working-directory: mobile/packages/mopro_api
      - name: dart analyze mopro_api
        run: dart analyze
        working-directory: mobile/packages/mopro_api

  # TOOLING_AUDIT T-010: translation-completeness gate. Runs from the repo root
  # (overrides this workflow's mobile/ default) — needs only jq + make, no
  # Flutter. Fails on EXTRA keys; missing keys are informational (see the script
  # header / Makefile i18n-check). jq is preinstalled on ubuntu-latest.
  i18n-check:
    name: i18n completeness (extras gate)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v6
      - run: make i18n-check

  # TOOLING_AUDIT T-001: dead-key + missing-key ratchet. Orthogonal to
  # i18n-check (completeness) — both run. Needs dart (zero-dep analyzer, no
  # pub get); runs from the repo root.
  i18n-usage:
    name: i18n dead-key gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable
      - run: make i18n-usage

  # TOOLING_AUDIT T3-5: Riverpod inferred-type-provider ratchet (zero-dep dart,
  # root working-dir). Notifier shapes are informational; only inferred drift gates.
  riverpod-check:
    name: riverpod inference gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable
      - run: make riverpod-check
