name: build-images

# Builds + pushes the three backend service images on main push (and on demand
# via workflow_dispatch). Mirrors `make docker-build`: one parameterized
# build/Dockerfile, selected per service via the SERVICE build-arg.
#
# Registry namespace is owner-relative (ghcr.io/<repo-owner>/<svc>) so the
# workflow builds + pushes from whatever org/user owns the repo — exercisable
# from a fork today, and it auto-targets ghcr.io/mopro/* once the repo lives
# under the `mopro` org. NOTE: deploy/docker-compose.yml pins ghcr.io/mopro/*;
# when running under a different owner, point the host pull at the owner's
# namespace or override VERSION/image refs accordingly (see docs/deploy.md).

on:
  push:
    branches: [main]
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'pkg/**'
      - 'go.mod'
      - 'go.sum'
      - 'build/Dockerfile'
      - '.github/workflows/build-images.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [core-svc, fin-svc, jobs-svc]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute namespace + tags
        id: meta
        run: |
          owner="${{ github.repository_owner }}"
          echo "ns=ghcr.io/${owner,,}" >> "$GITHUB_OUTPUT"          # GHCR requires lowercase
          echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "short_sha=$(git rev-parse --short=8 HEAD)" >> "$GITHUB_OUTPUT"
          echo "built_at=$(date -u +%FT%TZ)" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: build/Dockerfile
          push: true
          platforms: linux/amd64
          build-args: |
            SERVICE=${{ matrix.service }}
            BUILD_SHA=${{ steps.meta.outputs.sha }}
            BUILT_AT=${{ steps.meta.outputs.built_at }}
          tags: |
            ${{ steps.meta.outputs.ns }}/${{ matrix.service }}:latest
            ${{ steps.meta.outputs.ns }}/${{ matrix.service }}:${{ steps.meta.outputs.sha }}
            ${{ steps.meta.outputs.ns }}/${{ matrix.service }}:${{ steps.meta.outputs.short_sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max
