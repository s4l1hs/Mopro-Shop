name: make-verify

# Runs the canonical `make verify` gate on every PR to main (and on main push).
# This is the CI enforcement of the local pre-push gate — closes the gap that
# let internal/e2e/ rot silently (PR #40). make verify orchestrates: fmt, vet,
# go test (incl. -tags=integration e2e + property suites with Docker-bootstrapped
# postgres/redis), golangci-lint, module boundaries, and the Flutter WCAG
# contrast test — so this job needs Go + Flutter + golangci-lint + Docker.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Pin the same exact Flutter version as the rest of CI (CI-hygiene-2).
# KEEP IN SYNC with flutter-ci.yml / golden-rebaseline.yml / openapi-ci.yml.
env:
  FLUTTER_VERSION: "3.44.1"

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install golangci-lint (v2 — matches .golangci.yml)
        run: |
          # Fetch the installer to a file with retries (don't pipe curl|sh — a
          # mid-stream network blip would partially-pipe). Retry transient
          # transport failures so a hiccup can't redden the required gate.
          curl -sSfL \
            --retry 5 --retry-delay 5 --retry-all-errors --retry-connrefused \
            --connect-timeout 30 --max-time 120 \
            https://raw.githubusercontent.com/golangci/golangci-lint/v2.12.2/install.sh \
            -o /tmp/golangci-install.sh
          sh /tmp/golangci-install.sh -b "$(go env GOPATH)/bin" v2.12.2
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Flutter deps (for verify-contrast)
        run: flutter pub get
        working-directory: mobile

      # verify-image-manifest → tool/audit-images.sh needs the IM7 `magick`
      # unified binary. Ubuntu 24.04's apt `imagemagick` is IM6 (no `magick`),
      # so install the official IM7 portable binary. It's an AppImage and the
      # runner lacks libfuse2, so extract it headless once and symlink AppRun.
      - name: Install ImageMagick 7 (for verify-image-manifest)
        run: |
          # Runtime download of the IM7 portable binary. A bare curl made the
          # required `verify` gate hostage to a transient blip (PR #226 went red on
          # `curl: (7) Couldn't connect to server`). Retry + timeout so a flake
          # retries instead of failing the gate.
          curl -fsSL \
            --retry 5 --retry-delay 5 --retry-all-errors --retry-connrefused \
            --connect-timeout 30 --max-time 300 \
            https://imagemagick.org/archive/binaries/magick -o /tmp/magick.appimage
          chmod +x /tmp/magick.appimage
          ( cd /tmp && ./magick.appimage --appimage-extract >/dev/null )
          sudo mv /tmp/squashfs-root /opt/imagemagick7
          sudo ln -sf /opt/imagemagick7/AppRun /usr/local/bin/magick
          magick --version

      # Docker is preinstalled on ubuntu-latest. make verify's property-* and
      # integration-e2e sub-targets bring up their own postgres/redis containers
      # via `docker run` (pg-ledger-test-up / e2e-test-up) — no compose services
      # block needed here.
      - name: make verify
        run: make verify

      - name: Tear down test containers
        if: always()
        run: make pg-ledger-test-down e2e-test-down || true
