# Dependabot — automated dependency-update PRs (TOOLING_AUDIT T-003).
# Covers every ecosystem present in the repo: the single root Go module,
# GitHub Actions workflow pins, and the Flutter (pub) app under mobile/.
# Minor+patch updates are grouped to keep PR volume low; majors come solo
# so they get individual review.
version: 2
updates:
  # Backend — single Go module at the repo root (github.com/mopro/platform).
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      go-minor-patch:
        update-types: [minor, patch]
    commit-message:
      prefix: "chore(deps)"

  # CI — action version pins in .github/workflows/**.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      actions-minor-patch:
        update-types: [minor, patch]
    commit-message:
      prefix: "chore(ci)"

  # Mobile — Flutter app (pubspec.yaml lives in mobile/).
  - package-ecosystem: pub
    directory: "/mobile"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      pub-minor-patch:
        update-types: [minor, patch]
    # Breaking majors must NOT auto-land for the Flutter app: a major needs a
    # deliberate, code-migrating PR, not an unmigrated bump. flutter_riverpod
    # 2.6.1 → 3.3.1 (PR #120, F-022) auto-merged with no migration and left main
    # non-compiling (785 analyze errors). Ignore ALL pub semver-majors until each
    # is taken on purpose; minor/patch still flow (grouped above). The systemic
    # backstop is making `flutter analyze` a required check on main — see
    # docs/internal/f022-deps-stability.md §4.
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    commit-message:
      prefix: "chore(deps)"
