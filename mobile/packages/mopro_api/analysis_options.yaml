analyzer:
  language:
    strict-inference: true
    strict-raw-types: true
    strict-casts: false
  exclude:
    - test/*.dart
    - lib/src/model/*.g.dart
  errors:
    deprecated_member_use_from_same_package: ignore
    # dart-dio emits an ErrorEnvelope import in every *_api.dart even when the
    # operation surfaces errors via DioException rather than the typed model,
    # leaving the import unused. This is generator template noise, not our code.
    unused_import: ignore
