name: mopro_api
version: 1.0.0
description: OpenAPI API client
homepage: homepage

environment:
  # Floor is Dart 3.8 because json_serializable 6.9+ emits the
  # `null-aware-elements` syntax (`'key': ?value`) into .g.dart files for
  # @JsonKey(includeIfNull: false) fields. That language feature is
  # enabled-by-default starting in Dart 3.8; older floors trip the
  # dart_style formatter inside build_runner. See chore/api-gen-toolchain PR.
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  dio: '^5.2.0'
  # Pinned to ^4.12.0 to satisfy json_serializable 6.14.0's lower bound.
  json_annotation: '^4.12.0'

dev_dependencies:
  build_runner: any
  json_serializable: '^6.1.5'
  test: ^1.16.0
