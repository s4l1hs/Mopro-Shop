name: mopro
description: Mopro Shop — mobile-first marketplace app for Turkey launch.
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: '>=3.24.0'

dependencies:
  dio: ^5.7.0
  easy_localization: ^3.0.7
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  flutter_secure_storage: ^9.2.2
  go_router: ^14.2.0
  intl: ^0.20.2
  json_annotation: ^4.9.0
  mopro_api:
    path: packages/mopro_api
  uuid: ^4.5.1

dev_dependencies:
  build_runner: ^2.4.13
  build_test: ^3.5.15
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  json_serializable: ^6.8.0
  mockito: ^5.4.4
  very_good_analysis: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/translations/
