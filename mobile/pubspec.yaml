name: mopro
description: Mopro Shop — mobile-first marketplace app for Turkey launch.
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.6.0 <4.0.0'
  flutter: '>=3.24.0'

dependencies:
  cached_network_image: ^3.4.1
  # clock: testable "now" so the flash-deals countdown is deterministic in
  # goldens/tests (withClock). Already in the dep tree transitively.
  clock: ^1.1.1
  dio: ^5.7.0
  easy_localization: ^3.0.7
  flutter:
    sdk: flutter
  flutter_markdown: ^0.7.0
  flutter_riverpod: ^3.3.1
  flutter_secure_storage: ^9.2.2
  flutter_web_plugins:
    sdk: flutter
  go_router: ^14.2.0
  google_fonts: ^6.2.1
  intl: ^0.20.2
  mopro_api:
    path: packages/mopro_api
  photo_view: ^0.15.0
  share_plus: ^10.1.1
  shared_preferences: ^2.3.2
  shimmer: ^3.0.0
  smooth_page_indicator: ^1.1.0
  uuid: ^4.5.1
  web: ^1.1.0
  webview_flutter: ^4.10.0

dev_dependencies:
  build_runner: ^2.4.13
  build_test: ^3.5.15
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  json_serializable: ^6.8.0
  mockito: ^5.4.4
  very_good_analysis: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/translations/
    - assets/data/
    - assets/images/
    # Bundled Inter static weights so google_fonts resolves Inter from assets
    # (allowRuntimeFetching=false) instead of fetching at runtime — deterministic
    # text rendering for goldens on every platform, and no runtime font fetch.
    - assets/google_fonts/
