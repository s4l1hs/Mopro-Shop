name: mopro
description: Mopro Shop — mobile-first marketplace app for Turkey launch.
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.6.0 <4.0.0'
  flutter: '>=3.24.0'

dependencies:
  cached_network_image: ^3.4.1
  carousel_slider: ^5.0.0
  dio: ^5.7.0
  easy_localization: ^3.0.7
  flutter:
    sdk: flutter
  flutter_markdown: ^0.7.0
  flutter_riverpod: ^2.5.1
  flutter_secure_storage: ^9.2.2
  go_router: ^14.2.0
  google_fonts: ^6.2.1
  intl: ^0.20.2
  json_annotation: ^4.9.0
  mopro_api:
    path: packages/mopro_api
  photo_view: ^0.15.0
  shared_preferences: ^2.3.2
  shimmer: ^3.0.0
  smooth_page_indicator: ^1.1.0
  uuid: ^4.5.1
  webview_flutter: ^4.10.0

dev_dependencies:
  build_runner: ^2.4.13
  build_test: ^3.5.15
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  json_serializable: ^6.8.0
  mockito: ^5.4.4
  very_good_analysis: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/translations/
    - assets/data/
