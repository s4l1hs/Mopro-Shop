# PostgreSQL 16 — postgres-ledger (FinTech isolation)
# Resource limits from INFRASTRUCTURE.md: 3 GB RAM / 1.5 CPUs / shm_size 128m

listen_addresses = '*'
max_connections = 100          # fin-svc only; pgbouncer multiplexes
superuser_reserved_connections = 3

# Memory
shared_buffers = 1GB
effective_cache_size = 3GB
work_mem = 8MB
maintenance_work_mem = 128MB
wal_buffers = 32MB

# Checkpointing — stricter for ledger integrity
checkpoint_completion_target = 0.9
max_wal_size = 1GB
min_wal_size = 128MB
fsync = on
full_page_writes = on
synchronous_commit = on        # ledger MUST be durable; never set to off

# Append-only enforcement (blocks UPDATE/DELETE on ledger tables)
# Applied via Postgres RULES in migrations — DO NOT disable

# Logging
log_min_duration_statement = 500    # log queries > 500 ms
log_checkpoints = on
log_connections = on
log_disconnections = on
log_lock_waits = on
log_temp_files = 0

# Locale
lc_messages = 'en_US.UTF-8'
lc_monetary = 'en_US.UTF-8'
lc_numeric = 'en_US.UTF-8'
lc_time = 'en_US.UTF-8'

# Extensions
shared_preload_libraries = 'pg_stat_statements'
pg_stat_statements.max = 10000
pg_stat_statements.track = all

# Timezone
timezone = 'UTC'
