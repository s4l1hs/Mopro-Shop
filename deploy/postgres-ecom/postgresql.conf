# PostgreSQL 16 — postgres-ecom (e-commerce side)
# Resource limits from INFRASTRUCTURE.md: 5 GB RAM / 2.0 CPUs / shm_size 256m

listen_addresses = '*'
max_connections = 200          # pgbouncer multiplexes; keep this low
superuser_reserved_connections = 3

# Memory
shared_buffers = 2GB
effective_cache_size = 6GB
work_mem = 16MB
maintenance_work_mem = 256MB
wal_buffers = 64MB

# Checkpointing
checkpoint_completion_target = 0.9
max_wal_size = 2GB
min_wal_size = 256MB

# Logging
log_min_duration_statement = 1000   # log queries > 1 s
log_checkpoints = on
log_connections = off
log_disconnections = off
log_lock_waits = on
log_temp_files = 0

# Locale
lc_messages = 'en_US.UTF-8'
lc_monetary = 'en_US.UTF-8'
lc_numeric = 'en_US.UTF-8'
lc_time = 'en_US.UTF-8'
default_text_search_config = 'pg_catalog.turkish'

# Extensions
shared_preload_libraries = 'pg_stat_statements'
pg_stat_statements.max = 10000
pg_stat_statements.track = all

# Timezone
timezone = 'UTC'
