name: mopro

# Production Docker Compose — Mopro Shop
# Uses pre-built images loaded via `docker load` (docker save/load pattern).
# Secrets live in /etc/mopro/.env (chmod 600, root:root).
# Run from /opt/mopro/: docker compose -f docker-compose.prod.yml up -d

# ── YAML anchor: shared security + resource defaults for Go binaries ──────────
x-go-defaults: &go-defaults
  restart: unless-stopped
  mem_limit: 384m
  mem_reservation: 192m
  cpus: '0.5'
  pids_limit: 256
  security_opt:
    - no-new-privileges:true
  cap_drop: [ALL]
  read_only: true
  tmpfs:
    - /tmp:size=64M,mode=1777
  ulimits:
    nofile: { soft: 4096, hard: 8192 }
  logging:
    driver: json-file
    options: { max-size: "20m", max-file: "5" }
  networks: [mopro-net]

# ── Networks ─────────────────────────────────────────────────────────────────
# mopro-fin-net is internal: postgres-ledger has no internet egress path.
networks:
  mopro-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24
  mopro-fin-net:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.31.0.0/24

# ── Named volumes for Caddy TLS state ────────────────────────────────────────
volumes:
  caddy-data:
    labels: { mopro.keep: "true" }
  caddy-config:
    labels: { mopro.keep: "true" }

services:

  # ── PostgreSQL (e-commerce side) ────────────────────────────────────────────
  postgres-ecom:
    container_name: postgres-ecom
    image: postgres:16-alpine
    restart: unless-stopped
    networks: [mopro-net]
    mem_limit: 5g
    mem_reservation: 3g
    cpus: '2.0'
    shm_size: 256m
    read_only: false
    cap_drop: [ALL]
    cap_add: [CHOWN, DAC_OVERRIDE, FOWNER, SETGID, SETUID]
    security_opt:
      - no-new-privileges:true
    pids_limit: 512
    logging:
      driver: json-file
      options: { max-size: "20m", max-file: "5" }
    env_file: [.env]
    environment:
      POSTGRES_DB: mopro_ecom
      POSTGRES_USER: ecom_admin
      POSTGRES_PASSWORD: "${ECOM_DB_PASSWORD}"
    volumes:
      - /opt/mopro/data/postgres-ecom:/var/lib/postgresql/data
      - ./postgres-ecom/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./postgres-ecom/init:/docker-entrypoint-initdb.d:ro
    command: ["postgres", "-c", "config_file=/etc/postgresql/postgresql.conf"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecom_admin -d mopro_ecom"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── PostgreSQL (ledger — fin-svc ONLY, mopro-fin-net) ──────────────────────
  postgres-ledger:
    container_name: postgres-ledger
    image: postgres:16-alpine
    restart: unless-stopped
    networks: [mopro-fin-net]
    mem_limit: 3g
    mem_reservation: 2g
    cpus: '1.5'
    shm_size: 128m
    read_only: false
    cap_drop: [ALL]
    cap_add: [CHOWN, DAC_OVERRIDE, FOWNER, SETGID, SETUID]
    security_opt:
      - no-new-privileges:true
    pids_limit: 512
    logging:
      driver: json-file
      options: { max-size: "20m", max-file: "5" }
    env_file: [.env]
    environment:
      POSTGRES_DB: mopro_ledger
      POSTGRES_USER: ledger_admin
      POSTGRES_PASSWORD: "${LEDGER_DB_PASSWORD}"
    volumes:
      - /opt/mopro/data/postgres-ledger:/var/lib/postgresql/data
      - ./postgres-ledger/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./postgres-ledger/init:/docker-entrypoint-initdb.d:ro
    command: ["postgres", "-c", "config_file=/etc/postgresql/postgresql.conf"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledger_admin -d mopro_ledger"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── PostgreSQL (config — stub, Phase 4.0.5) ──────────────────────────────────
  # Placeholder cluster for future feature-flag / remote-config store.
  # OQ-C: stub only; no init scripts; no services connect to it yet.
  postgres-config:
    container_name: postgres-config
    image: postgres:16-alpine
    restart: unless-stopped
    networks: [mopro-net]
    mem_limit: 512m
    mem_reservation: 256m
    cpus: '0.5'
    shm_size: 64m
    read_only: false
    cap_drop: [ALL]
    cap_add: [CHOWN, DAC_OVERRIDE, FOWNER, SETGID, SETUID]
    security_opt:
      - no-new-privileges:true
    pids_limit: 128
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }
    environment:
      POSTGRES_DB: mopro_config
      POSTGRES_USER: config_admin
      POSTGRES_PASSWORD: "${ECOM_DB_PASSWORD}"
    volumes:
      - /opt/mopro/data/postgres-config:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U config_admin -d mopro_config"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ── DB password sidecar (one-shot, runs after both Postgres are healthy) ─────
  init-passwords:
    container_name: init-passwords
    image: postgres:16-alpine
    restart: "no"
    networks: [mopro-net, mopro-fin-net]
    env_file: [.env]
    depends_on:
      postgres-ecom:
        condition: service_healthy
      postgres-ledger:
        condition: service_healthy
    volumes:
      - ./postgres-ecom/init/99-set-passwords.sh:/scripts/99-set-passwords-ecom.sh:ro
      - ./postgres-ledger/init/99-set-passwords.sh:/scripts/99-set-passwords-ledger.sh:ro
    command:
      - sh
      - -c
      - |
        PGHOST=postgres-ecom PGPORT=5432 PGUSER=ecom_admin \
          PGDATABASE=mopro_ecom PGPASSWORD="$$ECOM_DB_PASSWORD" \
          /scripts/99-set-passwords-ecom.sh &&
        PGHOST=postgres-ledger PGPORT=5432 PGUSER=ledger_admin \
          PGDATABASE=mopro_ledger PGPASSWORD="$$LEDGER_DB_PASSWORD" \
          /scripts/99-set-passwords-ledger.sh

  # ── PgBouncer (ecom side, mopro-net) ─────────────────────────────────────────
  pgbouncer-ecom:
    container_name: pgbouncer-ecom
    image: edoburu/pgbouncer:latest
    restart: unless-stopped
    networks: [mopro-net]
    mem_limit: 128m
    cpus: '0.2'
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }
    environment:
      DB_HOST: postgres-ecom
      DB_PORT: "5432"
      DB_USER: ecom_admin
      DB_PASSWORD: "${ECOM_DB_PASSWORD}"
      DB_NAME: mopro_ecom
      POOL_MODE: transaction
      MAX_CLIENT_CONN: "500"
      DEFAULT_POOL_SIZE: "25"
      MIN_POOL_SIZE: "5"
      RESERVE_POOL_SIZE: "10"
      RESERVE_POOL_TIMEOUT: "3"
      AUTH_TYPE: scram-sha-256
    depends_on:
      postgres-ecom:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "5432"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── PgBouncer (ledger side, mopro-fin-net) ─────────────────────────────────
  pgbouncer-ledger:
    container_name: pgbouncer-ledger
    image: edoburu/pgbouncer:latest
    restart: unless-stopped
    networks: [mopro-fin-net]
    mem_limit: 128m
    cpus: '0.2'
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }
    environment:
      DB_HOST: postgres-ledger
      DB_PORT: "5432"
      DB_USER: ledger_admin
      DB_PASSWORD: "${LEDGER_DB_PASSWORD}"
      DB_NAME: mopro_ledger
      POOL_MODE: transaction
      MAX_CLIENT_CONN: "500"
      DEFAULT_POOL_SIZE: "25"
      MIN_POOL_SIZE: "5"
      RESERVE_POOL_SIZE: "10"
      RESERVE_POOL_TIMEOUT: "3"
      AUTH_TYPE: scram-sha-256
    depends_on:
      postgres-ledger:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "5432"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Redis 7 (cache + Streams — both networks) ─────────────────────────────────
  redis:
    container_name: redis
    image: redis:7-alpine
    user: "999:999"
    restart: unless-stopped
    networks: [mopro-net, mopro-fin-net]
    mem_limit: 1200m
    cpus: '1.0'
    cap_drop: [ALL]
    cap_add: [SETUID, SETGID]
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }
    env_file: [.env]
    command:
      - redis-server
      - /etc/redis/redis.conf
      - --requirepass
      - "${REDIS_PASSWORD}"
    volumes:
      - /opt/mopro/data/redis:/data
      - ./redis/redis.conf:/etc/redis/redis.conf:ro
    tmpfs:
      - /var/run/redis
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Meilisearch v1.6 ────────────────────────────────────────────────────────
  meilisearch:
    container_name: meilisearch
    image: getmeili/meilisearch:v1.6
    user: "1000:1000"
    restart: unless-stopped
    networks: [mopro-net]
    mem_limit: 1500m
    cpus: '1.0'
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }
    env_file: [.env]
    environment:
      MEILI_MASTER_KEY: "${MEILI_MASTER_KEY}"
      MEILI_ENV: production
    volumes:
      - /opt/mopro/data/meili:/meili_data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:7700/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Caddy 2.8 (reverse proxy + TLS) — pinned to 2.8-alpine ───────────────────
  caddy:
    container_name: caddy
    image: caddy:2.8-alpine
    restart: unless-stopped
    networks: [mopro-net]
    mem_limit: 256m
    cpus: '0.5'
    cap_drop: [ALL]
    cap_add: [NET_BIND_SERVICE]
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options: { max-size: "20m", max-file: "5" }
    env_file: [.env]
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      CADDY_EMAIL: "${CADDY_EMAIL}"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      core-svc:
        condition: service_started
      fin-svc:
        condition: service_started
      jobs-svc:
        condition: service_started
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "80"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── core-svc (distroless/static-debian12:nonroot per CLAUDE.md §6) ───────────
  core-svc:
    <<: *go-defaults
    container_name: core-svc
    image: ghcr.io/${IMAGE_NS:-s4l1hs}/core-svc:${VERSION:-latest}
    env_file: [.env]
    environment:
      SVC_NAME: core-svc
      MARKET: "${MARKET:-TR}"
      DEFAULT_CURRENCY: "${DEFAULT_CURRENCY:-TRY}"
      DEFAULT_LOCALE: "${DEFAULT_LOCALE:-tr-TR}"
      DEFAULT_CASHBACK_CURRENCY: "${DEFAULT_CASHBACK_CURRENCY:-TRY_COIN}"
      PSP_PROVIDER: "${PSP_PROVIDER:-sipay}"
      SIPAY_BASE_URL: "${SIPAY_BASE_URL:-https://app.sipay.com.tr/ccpayment}"
      SIPAY_MERCHANT_KEY: "${SIPAY_MERCHANT_KEY}"
      SIPAY_APP_ID: "${SIPAY_APP_ID}"
      SIPAY_APP_SECRET: "${SIPAY_APP_SECRET}"
      SIPAY_MERCHANT_ID: "${SIPAY_MERCHANT_ID:-}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "grafana-agent:4317"
      OTEL_SERVICE_NAME: "core-svc"
      OTEL_RESOURCE_ATTRIBUTES: "market=${MARKET:-TR},deployment.environment=${ENV:-prod}"
    ports:
      - "127.0.0.1:8080:8080"
    expose:
      - "9100"  # Prometheus /metrics — scraped by grafana-agent on mopro-net
    depends_on:
      pgbouncer-ecom:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      disable: true

  # ── fin-svc (dual-homed: mopro-net for Redis + mopro-fin-net for ledger) ─────
  fin-svc:
    <<: *go-defaults
    container_name: fin-svc
    networks: [mopro-net, mopro-fin-net]
    image: ghcr.io/${IMAGE_NS:-s4l1hs}/fin-svc:${VERSION:-latest}
    env_file: [.env]
    environment:
      SVC_NAME: fin-svc
      MARKET: "${MARKET:-TR}"
      DEFAULT_CURRENCY: "${DEFAULT_CURRENCY:-TRY}"
      SLACK_DLQ_WEBHOOK_URL: "${SLACK_DLQ_WEBHOOK_URL:-}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "grafana-agent:4317"
      OTEL_SERVICE_NAME: "fin-svc"
      OTEL_RESOURCE_ATTRIBUTES: "market=${MARKET:-TR},deployment.environment=${ENV:-prod}"
    ports:
      - "127.0.0.1:8081:8081"
    expose:
      - "9101"  # Prometheus /metrics — scraped by grafana-agent on mopro-fin-net
    depends_on:
      pgbouncer-ledger:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      disable: true

  # ── jobs-svc (v7: ONNX ML + e-invoice — higher mem ceiling) ──────────────────
  jobs-svc:
    <<: *go-defaults
    container_name: jobs-svc
    mem_limit: 1200m
    mem_reservation: 384m
    cpus: '0.8'
    image: ghcr.io/${IMAGE_NS:-s4l1hs}/jobs-svc:${VERSION:-latest}
    env_file: [.env]
    environment:
      SVC_NAME: jobs-svc
      MARKET: "${MARKET:-TR}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "grafana-agent:4317"
      OTEL_SERVICE_NAME: "jobs-svc"
      OTEL_RESOURCE_ATTRIBUTES: "market=${MARKET:-TR},deployment.environment=${ENV:-prod}"
    ports:
      - "127.0.0.1:8082:8080"
    expose:
      - "9102"  # Prometheus /metrics — scraped by grafana-agent on mopro-net
    depends_on:
      pgbouncer-ecom:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      disable: true

  # ── Grafana Agent (metrics + logs + traces → Grafana Cloud Free) ──────────────
  grafana-agent:
    container_name: grafana-agent
    image: grafana/agent:latest
    restart: unless-stopped
    networks: [mopro-net, mopro-fin-net]
    mem_limit: 300m
    cpus: '0.3'
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }
    env_file: [.env]
    volumes:
      - ./grafana-agent/agent.yaml:/etc/agent/agent.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: ["-config.file=/etc/agent/agent.yaml"]
    environment:
      GRAFANA_PROM_USER: "${GRAFANA_PROM_USER:-}"
      GRAFANA_PROM_PASS: "${GRAFANA_PROM_PASS:-}"
      GRAFANA_LOKI_USER: "${GRAFANA_LOKI_USER:-}"
      GRAFANA_LOKI_PASS: "${GRAFANA_LOKI_PASS:-}"
      GRAFANA_TEMPO_USER: "${GRAFANA_TEMPO_USER:-}"
      GRAFANA_TEMPO_PASS: "${GRAFANA_TEMPO_PASS:-}"
      MARKET: "${MARKET:-TR}"
