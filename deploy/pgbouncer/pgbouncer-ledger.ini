[databases]
mopro_ledger = host=postgres-ledger port=5432 dbname=mopro_ledger

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 5432
auth_type = md5
# auth_file is generated at container startup by the compose entrypoint command
# from LEDGER_DB_PASSWORD env var — see docker-compose.yml pgbouncer-ledger service.
auth_file = /tmp/userlist.txt

pool_mode = transaction
max_client_conn = 200
default_pool_size = 15
min_pool_size = 3
reserve_pool_size = 5
reserve_pool_timeout = 3

# Stricter timeouts for the ledger — transactions must complete quickly
server_idle_timeout = 300
client_idle_timeout = 0
query_timeout = 20

log_connections = 1
log_disconnections = 1
log_pooler_errors = 1
stats_period = 60

ignore_startup_parameters = extra_float_digits
