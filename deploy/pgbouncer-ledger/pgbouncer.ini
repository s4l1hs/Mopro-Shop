[databases]
mopro_ledger = host=postgres-ledger port=5432 dbname=mopro_ledger

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 5432

; scram-sha-256 is mandatory per CLAUDE.md §6.
; userlist.txt is generated at container startup by userlist.sh from env vars.
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt

pool_mode = transaction
max_client_conn = 500
default_pool_size = 25
min_pool_size = 5
reserve_pool_size = 10
reserve_pool_timeout = 3

server_idle_timeout = 600
client_idle_timeout = 0
query_timeout = 20

log_connections = 0
log_disconnections = 0
log_pooler_errors = 1
stats_period = 60

ignore_startup_parameters = extra_float_digits
