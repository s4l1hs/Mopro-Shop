# Grafana Agent — ships metrics (Prometheus), logs (Loki), traces (Tempo) to Grafana Cloud Free
# Schema: Grafana Agent static mode v0.36+ (grafana/agent:latest as of Phase 0.5)

metrics:
  global:
    scrape_interval: 30s
    external_labels:
      cluster: mopro
      market: "${MARKET:-TR}"
  configs:
    - name: mopro
      scrape_configs:
        - job_name: core-svc
          static_configs:
            - targets: ["core-svc:9100"]
              labels:
                service: core-svc
                market: "${MARKET:-TR}"
        - job_name: fin-svc
          static_configs:
            - targets: ["fin-svc:9101"]
              labels:
                service: fin-svc
                market: "${MARKET:-TR}"
        - job_name: jobs-svc
          static_configs:
            - targets: ["jobs-svc:9102"]
              labels:
                service: jobs-svc
                market: "${MARKET:-TR}"
      remote_write:
        - url: "https://prometheus-prod-01-eu-west-0.grafana.net/api/prom/push"
          basic_auth:
            username: "${GRAFANA_PROM_USER}"
            password: "${GRAFANA_PROM_PASS}"
          write_relabel_configs:
            - regex: 'instance_uuid|request_id|user_id'
              action: labeldrop

logs:
  configs:
    - name: mopro-logs
      # positions tracks which log offsets have been shipped; written to tmpfs.
      positions:
        filename: /tmp/positions.yaml
      clients:
        - url: "https://logs-prod-eu-west-0.grafana.net/loki/api/v1/push"
          basic_auth:
            username: "${GRAFANA_LOKI_USER}"
            password: "${GRAFANA_LOKI_PASS}"
      scrape_configs:
        - job_name: docker-logs
          docker_sd_configs:
            - host: unix:///var/run/docker.sock
              refresh_interval: 5s
          relabel_configs:
            - source_labels: [__meta_docker_container_name]
              target_label: container
            - source_labels: [__meta_docker_container_label_com_docker_compose_service]
              target_label: service
            - regex: 'instance_uuid|request_id|user_id'
              action: labeldrop

integrations:
  node_exporter:
    enabled: true
    # Expose host CPU, memory, disk, network metrics.
    # Textfile collector reads *.prom files written by backup-postgres.sh.
    rootfs_path: /
    sysfs_path: /sys
    procfs_path: /proc
    textfile_directory: /var/lib/node_exporter/textfile_collector
    disable_collectors:
      - arp
      - bcache
      - bonding
      - btrfs
      - conntrack
      - fibrechannel
      - infiniband
      - ipvs
      - mdadm
      - nfs
      - nfsd
      - nvme
      - powersupplyclass
      - rapl
      - schedstat
      - selinux
      - tapestats
      - udp_queues
      - xfs
      - zfs
    relabel_configs:
      - target_label: service
        replacement: node
      - target_label: cluster
        replacement: mopro

traces:
  configs:
    - name: mopro-traces
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: "0.0.0.0:4317"
            http:
              endpoint: "0.0.0.0:4318"
      remote_write:
        - endpoint: "tempo-prod-06-prod-eu-west-2.grafana.net:443"
          basic_auth:
            username: "${GRAFANA_TEMPO_USER}"
            password: "${GRAFANA_TEMPO_PASS}"
          tls_config:
            insecure_skip_verify: false
