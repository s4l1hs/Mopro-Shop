# Grafana Agent — ships metrics (Prometheus), logs (Loki), traces (Tempo) to Grafana Cloud Free
# TODO(mopro:placeholder): fill in Grafana Cloud endpoints once credentials provisioned
# Unblocked by: GRAFANA_PROM_USER, GRAFANA_LOKI_USER, GRAFANA_TEMPO_USER env vars

metrics:
  global:
    scrape_interval: 15s
  configs:
    - name: mopro
      scrape_configs:
        - job_name: core-svc
          static_configs:
            - targets: ["core-svc:9090"]
              labels:
                service: core-svc
                market: "${MARKET:-TR}"
        - job_name: fin-svc
          static_configs:
            - targets: ["fin-svc:9090"]
              labels:
                service: fin-svc
                market: "${MARKET:-TR}"
        - job_name: jobs-svc
          static_configs:
            - targets: ["jobs-svc:9090"]
              labels:
                service: jobs-svc
                market: "${MARKET:-TR}"
        - job_name: postgres-ecom
          static_configs:
            - targets: ["pgbouncer-ecom:5432"]
        - job_name: redis
          static_configs:
            - targets: ["redis:6379"]
      remote_write:
        - url: "https://prometheus-prod-01-eu-west-0.grafana.net/api/prom/push"
          basic_auth:
            username: "${GRAFANA_PROM_USER}"
            password: "${GRAFANA_PROM_PASS}"

logs:
  positions:
    filename: /tmp/positions.yaml
  configs:
    - name: mopro-logs
      clients:
        - url: "https://logs-prod-eu-west-0.grafana.net/loki/api/v1/push"
          basic_auth:
            username: "${GRAFANA_LOKI_USER}"
            password: "${GRAFANA_LOKI_PASS}"
      scrape_configs:
        - job_name: docker-logs
          docker_sd_configs:
            - host: unix:///var/run/docker.sock
              refresh_interval: 5s
          relabel_configs:
            - source_labels: [__meta_docker_container_name]
              target_label: container
            - source_labels: [__meta_docker_container_label_com_docker_compose_service]
              target_label: service

traces:
  configs:
    - name: mopro-traces
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: "0.0.0.0:4317"
            http:
              endpoint: "0.0.0.0:4318"
      remote_write:
        - endpoint: "tempo-prod-06-prod-eu-west-2.grafana.net:443"
          basic_auth:
            username: "${GRAFANA_TEMPO_USER}"
            password: "${GRAFANA_TEMPO_PASS}"
          tls_config:
            insecure: false
